apiVersion: v1
kind: Service
metadata:
  name: unbound
  namespace: mail
  labels:
    app: unbound
    tier: mail
    app.kubernetes.io/name: unbound
    app.kubernetes.io/instance: mail-resolver
    app.kubernetes.io/managed-by: argoCD
spec:
  type: ClusterIP
  clusterIP: 10.43.0.53
  selector:
    app: unbound
    tier: mail
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
