apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: unbound
  namespace: mail
spec:
  podSelector:
    matchLabels:
      app: unbound
      tier: mail
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rspamd
              tier: mail
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  egress:
    # Kubernetes service names still resolve through CoreDNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Public recursive DNS for RBL/DNSBL lookups.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
