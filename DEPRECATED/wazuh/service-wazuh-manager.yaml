---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-manager
  namespace: wazuh
  labels:
    app: wazuh-manager
spec:
  selector:
    app: wazuh-manager
  ports:
    - name: api
      port: 55000
      targetPort: 55000
    - name: registration
      port: 1515
      targetPort: 1515
    - name: agents-events
      port: 1514
      targetPort: 1514
  clusterIP: None
