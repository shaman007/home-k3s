---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wazuh-dashboard-certs
  namespace: wazuh
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: dashboard-certs
    creationPolicy: Owner
  data:
    - secretKey: cert.pem
      remoteRef:
        key: wazuh
        property: dashboard_pem
    - secretKey: key.pem
      remoteRef:
        key: wazuh
        property: dashboard_key_pem
    - secretKey: root-ca.pem
      remoteRef:
        key: wazuh
        property: root_ca_pem
