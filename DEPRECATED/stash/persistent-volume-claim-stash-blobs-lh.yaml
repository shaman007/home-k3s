apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: stash
  name: stash-blobs-lh
  labels:
    storage.k8s.io/name: longhorn
    app: stash
    app.kubernetes.io/name: stash
    app.kubernetes.io/instance: stash
    app.kubernetes.io/managed-by: argoCD
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 200Gi
