---
# DEPRECATED: Replaced by `elastic-stack-custom` (repo-managed Elasticsearch resource).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elastic-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.elastic.co
    targetRevision: 0.18.1
    chart: eck-stack
    helm:
      releaseName: es-quickstart
      values: |
        eck-kibana:
          enabled: false
        eck-elasticsearch:
          enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: elastic-stack
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
