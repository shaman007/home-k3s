---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wazuh
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/shaman007/home-k3s.git"
    path: wazuh
    targetRevision: HEAD
    directory:
      recurse: false
      include: "*-*.yaml"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: wazuh
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: vault-token
      namespace: wazuh
      jsonPointers:
        - /data/token
  syncPolicy:
    automated: {}
