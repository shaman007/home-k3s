apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: convertx
  name: andreybondarenko-ingress
  annotations:
    # Traefik router on HTTPS entrypoint
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

    # Use Traefik's ACME resolver
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    # Apply HSTS middleware
    traefik.ingress.kubernetes.io/router.middlewares: convertx-hsts@kubernetescrd

    # HTTP->HTTPS is handled globally on entryPoints,
    # so no per-ingress redirect annotation is needed.
  labels:
    app: convertx
    app.kubernetes.io/name: convertx
    app.kubernetes.io/instance: convertx
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: argoCD
spec:
  ingressClassName: traefik
  rules:
    - host: convert.andreybondarenko.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: convertx
                port:
                  number: 3000
