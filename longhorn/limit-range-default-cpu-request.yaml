---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-cpu-request
  namespace: longhorn-system
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 10m
        memory: 64Mi
      default:
        memory: 512Mi
      min:
        cpu: 5m
        memory: 32Mi
      max:
        cpu: "2"
        memory: 2Gi
