---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wordpress-daily-report
  namespace: wordpress
  labels:
    app.kubernetes.io/name: wordpress-daily-report
    app.kubernetes.io/instance: wordpress-daily-report
    app.kubernetes.io/part-of: wordpress
    app.kubernetes.io/managed-by: argoCD
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - create
      - update
      - patch
