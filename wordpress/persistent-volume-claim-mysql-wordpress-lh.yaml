---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-wordpress-lh
  namespace: wordpress
  labels:
    app: mysql-wordpress
    tier: mysql
    recurring-job.longhorn.io/source: enabled
    recurring-job.longhorn.io/snapshot-daily-retain1: enabled
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
