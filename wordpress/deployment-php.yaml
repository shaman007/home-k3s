---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: wordpress
  name: php
  labels:
    app: wordpress
    component: web
    app.kubernetes.io/name: wordpress
    app.kubernetes.io/instance: wordpress
    app.kubernetes.io/managed-by: argoCD
  annotations:
    configmap.reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wordpress
      component: web
  template:
    metadata:
      labels:
        app: wordpress
        component: web
    spec:
      securityContext:
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33
      volumes:
        - name: phpini
          configMap:
            name: php-fpm-config
        - name: mu-plugins
          configMap:
            name: wordpress-mu-plugins
        - name: wordpress-lh
          persistentVolumeClaim:
            claimName: wordpress-lh
        - name: varrun
          emptyDir:
            sizeLimit: 10Mi
        - name: run
          emptyDir:
            sizeLimit: 10Mi
        - name: tmp
          emptyDir:
            sizeLimit: 1000Mi
        - name: config
          configMap:
            name: nginx-config
            items:
              - key: config
                path: site.conf
        - name: cache
          emptyDir:
            sizeLimit: 500Mi
      containers:
        - name: php
          image: harbor.andreybondarenko.com/library/php:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: phpini
              mountPath: /etc/php/8.4/fpm/pool.d/php.ini
              subPath: php.ini
            - name: phpini
              mountPath: /etc/php/8.4/fpm/php.ini
              subPath: php.ini
            - name: phpini
              mountPath: /etc/php/8.4/fpm/pool.d/www.conf
              subPath: www.conf
            - name: wordpress-lh
              mountPath: /code
            - name: mu-plugins
              mountPath: /code/wp-content/mu-plugins/miniorange-redis-session-compat.php
              subPath: miniorange-redis-session-compat.php
            - name: varrun
              mountPath: /var/run/php
            - name: run
              mountPath: /run
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "66m"
              memory: "768Mi"
            limits:
              memory: "768Mi"
        - name: nginx
          image: harbor.andreybondarenko.com/dockerhub/nginx:1.29.7
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: wordpress-lh
              mountPath: /code
            - name: config
              mountPath: /etc/nginx/conf.d
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
          resources:
            requests:
              cpu: "10m"
              memory: "100Mi"
            limits:
              memory: "100Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
