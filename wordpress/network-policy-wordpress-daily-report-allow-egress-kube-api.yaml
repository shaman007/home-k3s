---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wordpress-daily-report-allow-egress-kube-api
  namespace: wordpress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wordpress-daily-report
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - protocol: TCP
          port: 443
    # The Kubernetes service can be enforced after DNAT; allow the Talos
    # control-plane endpoint on 6443 too.
    - to:
        - ipBlock:
            cidr: 192.168.1.0/24
      ports:
        - protocol: TCP
          port: 6443
