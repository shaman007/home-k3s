apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: elasticsearch-password
  namespace: mastodon
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-secret-store-mastodon
    kind: SecretStore
  target:
    name: elasticsearch-password
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        username: elastic
  data:
    - secretKey: password
      remoteRef:
        key: mastodon
        property: elasticsearch-password
