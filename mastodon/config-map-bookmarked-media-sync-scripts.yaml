---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bookmarked-media-sync-scripts
  namespace: mastodon
  labels:
    app.kubernetes.io/name: bookmarked-media-sync
    app.kubernetes.io/instance: bookmarked-media-sync
    app.kubernetes.io/part-of: mastodon
    app.kubernetes.io/managed-by: argoCD
data:
  list_bookmarked_media_s3.rb: |
    # script/list_bookmarked_media_s3.rb
    #
    # Generate a JSONL manifest for media attached to bookmarked statuses.
    # Output: export/bookmarked_media_manifest.jsonl
    # Set BOOKMARKED_MEDIA_LOOKBACK_DAYS to reduce the time window later.

    require "fileutils"
    require "json"
    require "nokogiri"
    require "uri"

    S3_HOST   = "https://s3.andreybondarenko.com"
    S3_BUCKET = "mastodon" # path-style bucket as you described
    LOOKBACK_DAYS = Integer(ENV.fetch("BOOKMARKED_MEDIA_LOOKBACK_DAYS", "30"), 10)

    EXPORT_DIR  = Rails.root.join("export")
    OUTPUT_PATH = EXPORT_DIR.join("bookmarked_media_manifest.jsonl")
    LOOKBACK_CUTOFF = LOOKBACK_DAYS.days.ago

    FileUtils.mkdir_p(EXPORT_DIR)

    puts "Writing S3 URL list to: #{OUTPUT_PATH}"
    puts "Filtering bookmarks created since: #{LOOKBACK_CUTOFF.iso8601}"

    File.open(OUTPUT_PATH, "w") do |out|
      Bookmark
        .where("bookmarks.created_at >= ?", LOOKBACK_CUTOFF)
        .includes(status: :media_attachments)
        .find_each do |bookmark|
          status = bookmark.status
          next unless status

          fragment = Nokogiri::HTML.fragment(status.text.to_s)
          fragment.css("a").remove
          description = fragment.text
            .gsub(%r{https?://\S+}, "")
            .gsub(/(?<!\w)#[\p{L}\p{M}\p{N}_\u200c\u200d]+/u, "")
            .lines
            .map { |line| line.gsub(/[ \t]+/, " ").strip }
            .join("\n")
            .gsub(/\n{3,}/, "\n\n")
            .strip

          status.media_attachments.each do |media|
            begin
              uploader = media.file if media.respond_to?(:file)
              next unless uploader

              key = nil

              # 1) Try file.path (often S3 key or local path)
              if uploader.respond_to?(:path) && uploader.path.present?
                path = uploader.path.to_s

                # If this is a local path with /system/ in it, strip everything up to /system/
                if path.include?("/system/")
                  key = path.split("/system/", 2).last
                  key = "system/#{key}"
                else
                  # Otherwise assume it's already a key
                  key = path.sub(%r{^/}, "")
                end
              end

              # 2) Fallback: parse from file.url if path wasn't usable
              if key.nil? && uploader.respond_to?(:url) && uploader.url.present?
                url = uploader.url.to_s

                if url.start_with?("http")
                  uri = URI(url)
                  # If path starts with /mastodon/, strip that as bucket prefix
                  # /mastodon/system/... -> system/...
                  path = uri.path.sub(%r{^/}, "")
                  if path.start_with?("#{S3_BUCKET}/")
                    key = path.sub(%r{^#{Regexp.escape(S3_BUCKET)}/}, "")
                  else
                    # If it's already like system/..., accept as key
                    key = path
                  end
                else
                  # relative url like /system/media_attachments/...
                  key = url.sub(%r{^/}, "")
                end
              end

              unless key && !key.empty?
                warn "Could not determine key for media #{media.id}, bookmark #{bookmark.id}"
                next
              end

              full_url = "#{S3_HOST}/#{S3_BUCKET}/#{key}"
              out.puts({
                id: media.id.to_s,
                status_id: status.id.to_s,
                url: full_url,
                relative_path: key,
                description: description,
              }.to_json)
            rescue => e
              warn "Error for bookmark #{bookmark.id}, media #{media.id}: #{e.class} #{e.message}"
            end
          end
        end
      end

    puts "Done."
  fetch-bookmarked-media.sh: |
    #!/bin/sh
    set -eu

    pod_selector="app.kubernetes.io/component=web,app.kubernetes.io/instance=mastodon"
    remote_script_path="/tmp/list_bookmarked_media_s3.rb"
    remote_output_path="/opt/mastodon/export/bookmarked_media_manifest.jsonl"
    export_file="/work/export/bookmarked_media_manifest.jsonl"
    download_dir="/work/import"
    max_attempts="${BOOKMARKED_MEDIA_DOWNLOAD_MAX_ATTEMPTS:-8}"
    retry_delay_seconds="${BOOKMARKED_MEDIA_DOWNLOAD_RETRY_DELAY_SECONDS:-15}"

    rm -rf /work/export /work/import
    mkdir -p /work/export "${download_dir}"

    pod_name="$(kubectl get pods -n mastodon -l "${pod_selector}" -o jsonpath="{.items[0].metadata.name}")"

    if [ -z "${pod_name}" ]; then
      echo "No mastodon-web pod matched selector ${pod_selector}" >&2
      exit 1
    fi

    echo "Using pod ${pod_name}"

    kubectl exec -i -n mastodon "${pod_name}" -c mastodon-web -- sh -c "cat > ${remote_script_path}" < /scripts/list_bookmarked_media_s3.rb

    kubectl exec -n mastodon "${pod_name}" -c mastodon-web -- sh -lc "rm -f ${remote_output_path}; BOOKMARKED_MEDIA_LOOKBACK_DAYS='${BOOKMARKED_MEDIA_LOOKBACK_DAYS:-30}' bundle exec rails runner ${remote_script_path}"

    kubectl exec -n mastodon "${pod_name}" -c mastodon-web -- cat "${remote_output_path}" > "${export_file}"

    if [ ! -s "${export_file}" ]; then
      echo "Mastodon export produced no URLs"
      exit 0
    fi

    sort -u "${export_file}" -o "${export_file}"

    while IFS= read -r entry; do
      url="$(printf '%s' "${entry}" | jq -r '.url')"
      relative_path="$(printf '%s' "${entry}" | jq -r '.relative_path')"
      [ -n "${url}" ] || continue

      destination="${download_dir}/${relative_path}"
      mkdir -p "$(dirname "${destination}")"

      attempt=1
      while [ "${attempt}" -le "${max_attempts}" ]; do
        echo "Downloading ${url} (attempt ${attempt}/${max_attempts})"
        if curl \
          --fail \
          --location \
          --continue-at - \
          --retry 5 \
          --retry-all-errors \
          --retry-delay 5 \
          --connect-timeout 15 \
          --speed-limit 1024 \
          --speed-time 30 \
          --output "${destination}" \
          "${url}"; then
          break
        fi

        status="$?"
        rm -f "${destination}"
        if [ "${attempt}" -ge "${max_attempts}" ]; then
          echo "Failed to download required object after ${max_attempts} attempts: ${url}" >&2
          exit "${status}"
        fi

        echo "Download attempt ${attempt} failed with curl exit code ${status}; retrying in ${retry_delay_seconds}s" >&2
        sleep "${retry_delay_seconds}"
        attempt=$((attempt + 1))
      done
    done < "${export_file}"

    file_count="$(find "${download_dir}" -type f | wc -l | tr -d ' ')"
    echo "Downloaded ${file_count} file(s)"
  apply-immich-descriptions.sh: |
    #!/bin/sh
    set -eu

    manifest="/work/export/bookmarked_media_manifest.jsonl"
    import_dir="/work/import"
    work_dir="/tmp/immich-description-sync"
    checksums="${work_dir}/checksums.jsonl"
    results="${work_dir}/results.jsonl"
    updates="${work_dir}/updates.jsonl"

    mkdir -p "${work_dir}"
    : >"${checksums}"
    : >"${results}"
    : >"${updates}"

    while IFS= read -r entry; do
      media_id="$(printf '%s' "${entry}" | jq -r '.id')"
      relative_path="$(printf '%s' "${entry}" | jq -r '.relative_path')"
      file="${import_dir}/${relative_path}"
      [ -f "${file}" ] || continue
      checksum="$(sha1sum "${file}" | cut -d ' ' -f 1)"
      jq -nc --arg id "${media_id}" --arg checksum "${checksum}" \
        '{id: $id, checksum: $checksum}' >>"${checksums}"
    done <"${manifest}"

    jq -s '[range(0; length; 100) as $i | {assets: .[$i:$i+100]}] | .[]' -c "${checksums}" \
      | while IFS= read -r payload; do
          curl --fail --silent --show-error \
            --retry 5 \
            --retry-all-errors \
            -H "content-type: application/json" \
            -H "x-api-key: ${IMMICH_API_KEY}" \
            -d "${payload}" \
            "${IMMICH_INSTANCE_URL}/assets/bulk-upload-check" | jq -c '.results[]'
        done >"${results}"

    jq -n -c \
      --slurpfile manifest "${manifest}" \
      --slurpfile results "${results}" '
        ($manifest | INDEX(.id)) as $items
        | $results
        | map(select(.assetId != null and (.isTrashed // false | not)))
        | map({assetId, status_id: $items[.id].status_id, description: $items[.id].description})
        | unique_by(.assetId)
        | group_by([.status_id, .description])[]
        | {ids: map(.assetId), description: .[0].description}
      ' >"${updates}"

    updated=0
    while IFS= read -r payload; do
      curl --fail --silent --show-error \
        --retry 5 \
        --retry-all-errors \
        -o /dev/null \
        -X PUT \
        -H "content-type: application/json" \
        -H "x-api-key: ${IMMICH_API_KEY}" \
        -d "${payload}" \
        "${IMMICH_INSTANCE_URL}/assets"
      updated="$((updated + $(printf '%s' "${payload}" | jq '.ids | length')))"
    done <"${updates}"

    echo "Updated descriptions on ${updated} Immich asset(s)"
