---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mastodon-bookmarked-media-sync-allow-egress-kube-api
  namespace: mastodon
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bookmarked-media-sync
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - protocol: TCP
          port: 443
