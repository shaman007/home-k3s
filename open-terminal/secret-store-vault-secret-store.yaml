apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-secret-store
  namespace: open-terminal
  annotations:
    vault.w386.k8s.my.lan/token-policies: open-terminal
  labels:
    app.kubernetes.io/name: open-terminal
    app.kubernetes.io/instance: open-terminal
    app.kubernetes.io/part-of: open-terminal
    app.kubernetes.io/managed-by: argo-cd
spec:
  refreshInterval: 900
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "kv"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
