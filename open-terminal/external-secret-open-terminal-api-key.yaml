apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-terminal-api-key
  namespace: open-terminal
  labels:
    app.kubernetes.io/name: open-terminal
    app.kubernetes.io/instance: open-terminal
    app.kubernetes.io/part-of: open-terminal
    app.kubernetes.io/managed-by: argo-cd
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: open-terminal-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: open-terminal
        property: api_key
