---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lenka
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/shaman007/home-k3s.git'
    path: lenka
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: lenka
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
