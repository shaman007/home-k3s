---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logs-check
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/shaman007/home-k3s.git"
    path: metrics
    targetRevision: HEAD
    directory:
      recurse: false
      include: "{config-map-logs-check-report.yaml,config-map-logs-check-scripts.yaml,cron-job-logs-check.yaml,network-policy-monitoring-allow-egress-logs-check-grafana.yaml,network-policy-monitoring-allow-egress-logs-check-kubernetes-api.yaml,network-policy-monitoring-allow-egress-logs-check-loki.yaml,network-policy-monitoring-allow-egress-logs-check-ollama.yaml,role-binding-logs-check.yaml,role-logs-check.yaml,service-account-logs-check.yaml}"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated: {}
