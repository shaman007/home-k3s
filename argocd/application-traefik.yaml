---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    targetRevision: 39.0.7
    chart: traefik
    helm:
      releaseName: traefik
      values: |
        certificatesResolvers:
          letsencrypt:
            acme:
              email: me@andreybondarenko.com
              httpChallenge:
                entryPoint: web
              storage: /data/acme.json
        deployment:
          initContainers:
          - command:
            - sh
            - -c
            - touch /data/acme.json; chmod -v 600 /data/acme.json
            image: docker.io/library/busybox:1.37.0
            name: volume-permissions
            volumeMounts:
            - mountPath: /data
              name: data
          - command:
            - sh
            - -ceu
            - |
              mkdir -p /geoip
              db_archive='/tmp/dbip-country-lite.mmdb.gz'
              db_url='https://download.db-ip.com/free/dbip-country-lite-latest.mmdb.gz'
              if ! wget -q -O "$db_archive" "$db_url"; then
                page="$(wget -qO- https://db-ip.com/db/download/ip-to-country-lite)"
                db_url="$(printf '%s' "$page" | tr '\n' ' ' | sed -n 's/.*\(https:\/\/download\.db-ip\.com\/free\/dbip-country-lite-[0-9][0-9][0-9][0-9]-[0-9][0-9]\.mmdb\.gz\).*/\1/p')"
                test -n "$db_url"
                wget -q -O "$db_archive" "$db_url"
              fi
              gunzip -c "$db_archive" > /geoip/dbip-country-lite.mmdb
              rm -f "$db_archive"
              chmod 0644 /geoip/dbip-country-lite.mmdb
            image: docker.io/library/busybox:1.37.0
            name: download-geoip-country-db
            volumeMounts:
            - mountPath: /geoip
              name: geoip-country-db
          additionalVolumes:
          - emptyDir: {}
            name: geoip-country-db
          replicas: 1
        additionalVolumeMounts:
        - mountPath: /geoip
          name: geoip-country-db
        experimental:
          plugins:
            geoip2:
              moduleName: github.com/thiagotognoli/traefikgeoip
              version: v1.1.1
        ingressRoute:
          dashboard:
            enabled: true
        additionalArguments:
        - --entryPoints.websecure.http.encodedCharacters.allowEncodedPercent=true
        - --entryPoints.websecure.http.encodedCharacters.allowEncodedSlash=true
        logs:
          access:
            enabled: true
          general:
            level: INFO
        persistence:
          accessMode: ReadWriteOnce
          enabled: true
          path: /data
          size: 1Gi
        podSecurityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
        updateStrategy:
          type: Recreate
        ports:
          imaps:
            expose:
              default: true
            exposedPort: 993
            port: 993
            protocol: TCP
          managesieve:
            expose:
              default: true
            exposedPort: 4190
            port: 4190
            protocol: TCP
          minecraft:
            expose:
              default: true
            exposedPort: 25565
            port: 25565
            protocol: TCP
          submission:
            expose:
              default: true
            exposedPort: 587
            port: 587
            protocol: TCP
          web:
            exposedPort: 80
            port: 80
            http:
              middlewares:
              - traefik-geoip-country@kubernetescrd
          websecure:
            exposedPort: 443
            port: 443
            http:
              middlewares:
              - traefik-geoip-country@kubernetescrd
              tls:
                enabled: true
        providers:
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true
        extraObjects:
        - apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: geoip-country
            namespace: traefik
          spec:
            plugin:
              geoip2:
                countryDbPath: /geoip/dbip-country-lite.mmdb
        - apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: geoip-db-refresh
            namespace: traefik
        - apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: geoip-db-refresh
            namespace: traefik
          rules:
          - apiGroups:
            - apps
            resourceNames:
            - '{{ include "traefik.fullname" . }}'
            resources:
            - deployments
            verbs:
            - get
            - patch
        - apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: geoip-db-refresh
            namespace: traefik
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: geoip-db-refresh
          subjects:
          - kind: ServiceAccount
            name: geoip-db-refresh
            namespace: traefik
        - apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: geoip-db-refresh
            namespace: traefik
          spec:
            concurrencyPolicy: Forbid
            failedJobsHistoryLimit: 3
            schedule: 17 4 2 * *
            successfulJobsHistoryLimit: 1
            jobTemplate:
              spec:
                backoffLimit: 1
                template:
                  spec:
                    serviceAccountName: geoip-db-refresh
                    restartPolicy: OnFailure
                    containers:
                    - command:
                      - sh
                      - -ceu
                      - |
                        api='https://kubernetes.default.svc/apis/apps/v1/namespaces/traefik/deployments/{{ include "traefik.fullname" . }}'
                        token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                        ca_cert='/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'
                        timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                        payload="$(printf '{"spec":{"template":{"metadata":{"annotations":{"geoip.db-ip.com/restarted-at":"%s"}}}}}' "$timestamp")"
                        curl --fail --silent --show-error \
                          --cacert "$ca_cert" \
                          -X PATCH \
                          -H "Authorization: Bearer $token" \
                          -H 'Content-Type: application/strategic-merge-patch+json' \
                          --data "$payload" \
                          "$api"
                      image: docker.io/curlimages/curl:8.12.1
                      imagePullPolicy: IfNotPresent
                      name: restart-traefik
        service:
          spec:
            externalTrafficPolicy: Local
            loadBalancerClass: metallb-l2
            loadBalancerIP: 192.168.1.210
          type: LoadBalancer
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: traefik
  syncPolicy:
    automated: {}
