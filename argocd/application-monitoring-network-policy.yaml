---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-network-policy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/shaman007/home-k3s.git"
    path: metrics
    targetRevision: HEAD
    directory:
      recurse: false
      include: "{cilium-network-policy-monitoring-allow-alloy-kube-apiserver.yaml,cilium-network-policy-monitoring-allow-external-access-daily-report-kube-apiserver.yaml,cilium-network-policy-monitoring-allow-finance-ticker-collector-kube-apiserver.yaml,cilium-network-policy-monitoring-allow-platform-health-report-kube-apiserver.yaml,cilium-network-policy-monitoring-allow-prometheus-kube-apiserver.yaml,network-policy-monitoring-allow-egress-alertmanager-mail.yaml,network-policy-monitoring-allow-egress-alloy-grafana-https.yaml,network-policy-monitoring-allow-egress-alloy-kubernetes-api.yaml,network-policy-monitoring-allow-egress-alloy-loki.yaml,network-policy-monitoring-allow-egress-dns.yaml,network-policy-monitoring-allow-egress-external-access-daily-report-kubernetes-api.yaml,network-policy-monitoring-allow-egress-external-access-daily-report-loki.yaml,network-policy-monitoring-allow-egress-external-access-daily-report-smtp.yaml,network-policy-monitoring-allow-egress-finance-ticker-collector-https.yaml,network-policy-monitoring-allow-egress-finance-ticker-collector-kubernetes-api.yaml,network-policy-monitoring-allow-egress-grafana-https.yaml,network-policy-monitoring-allow-egress-grafana-loki.yaml,network-policy-monitoring-allow-egress-intra-namespace.yaml,network-policy-monitoring-allow-egress-platform-health-report-kubernetes-api.yaml,network-policy-monitoring-allow-egress-platform-health-report-loki.yaml,network-policy-monitoring-allow-egress-platform-health-report-smtp.yaml,network-policy-monitoring-allow-egress-prometheus-external.yaml,network-policy-monitoring-allow-egress-prometheus-kubernetes-api.yaml,network-policy-monitoring-allow-egress-prometheus-scrape-targets.yaml,network-policy-monitoring-allow-egress-thanos-querier.yaml,network-policy-monitoring-allow-egress-thanos-s3.yaml,network-policy-monitoring-allow-ingress-from-monitoring.yaml,network-policy-monitoring-allow-ingress-from-traefik.yaml,network-policy-monitoring-allow-ingress-thanos-prometheus.yaml,network-policy-monitoring-allow-ingress-thanos-querier-from-prometheus-adapter.yaml,network-policy-monitoring-default-deny.yaml}"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated: {}
