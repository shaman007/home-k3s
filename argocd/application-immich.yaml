---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/shaman007/home-k3s.git"
    path: immich
    targetRevision: HEAD
  destination:
    server: "https://kubernetes.default.svc"
    namespace: immich
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
