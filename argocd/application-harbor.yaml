---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.goharbor.io
    targetRevision: 1.19.0
    chart: harbor
    helm:
      values: |
        core:
          priorityClassName: homelab-essential
          resources:
            requests:
              memory: 213Mi
              cpu: 10m
            limits:
              memory: 213Mi
        database:
          internal:
            priorityClassName: homelab-essential
            resources:
              requests:
                memory: 1250Mi
                cpu: 10m
              limits:
                memory: 1250Mi
        exporter:
          priorityClassName: homelab-essential
          replicas: 1
        expose:
          type: clusterIP
          tls:
            enabled: false
        jobservice:
          priorityClassName: homelab-essential
          initContainers:
            - name: wait-for-core
              image: busybox:1.38
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  until wget -qO- http://harbor-core:80/api/v2.0/ping >/dev/null; do
                    echo "waiting for harbor-core"
                    sleep 5
                  done
          resources:
            requests:
              memory: 100Mi
              cpu: 10m
            limits:
              memory: 100Mi
        nginx:
          priorityClassName: homelab-essential
          resources:
            requests:
              memory: 100Mi
              cpu: 10m
            limits:
              memory: 100Mi
        portal:
          priorityClassName: homelab-essential
          resources:
            requests:
              memory: 100Mi
              cpu: 10m
            limits:
              memory: 100Mi
        redis:
          internal:
            priorityClassName: homelab-essential
            resources:
              requests:
                memory: 113Mi
                cpu: 10m
              limits:
                memory: 113Mi
        registry:
          priorityClassName: homelab-essential
          registry:
            resources:
              requests:
                memory: 256Mi
                cpu: 25m
              limits:
                memory: 512Mi
          controller:
            resources:
              requests:
                memory: 100Mi
                cpu: 10m
              limits:
                memory: 100Mi
        trivy:
          priorityClassName: homelab-essential
          resources:
            requests:
              memory: 1Gi
              cpu: 100m
            limits:
              cpu: "12"
              memory: 2Gi
        notary:
          enabled: false
        metrics:
          enabled: true
          core:
            path: /metrics
            port: 8001
          registry:
            path: /metrics
            port: 8001
          jobservice:
            path: /metrics
            port: 8001
          exporter:
            path: /metrics
            port: 8001
        persistence:
          enabled: true
          resourcePolicy: keep
          persistentVolumeClaim:
            registry:
              existingClaim: harbor-registry
            jobservice:
              jobLog:
                existingClaim: harbor-jobservice
        updateStrategy:
          type: Recreate
        externalURL: https://harbor.andreybondarenko.com
        harborAdminPassword: Harbor12345
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: harbor
  ignoreDifferences:
  - group: ""
    kind: Secret
    jqPathExpressions:
    - .data
  - group: apps
    kind: Deployment
    jqPathExpressions:
    - .spec.template.metadata.annotations."checksum/secret"
    - .spec.template.metadata.annotations."checksum/secret-core"
    - .spec.template.metadata.annotations."checksum/secret-jobservice"
  syncPolicy:
    automated: {}
    syncOptions:
    - RespectIgnoreDifferences=true
