---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud
  namespace: nextcloud
  labels:
    app: nextcloud
    component: web
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/instance: nextcloud
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: argoCD
spec:
  schedule: "15 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: nextcloud
            component: web
            app.kubernetes.io/name: nextcloud
            app.kubernetes.io/instance: nextcloud
        spec:
          priorityClassName: homelab-batch
          containers:
            - name: previews
              image: harbor.andreybondarenko.com/library/php:latest
              imagePullPolicy: Always
              command:
                - /bin/sh
                - -c
                - "sleep 120; sudo -u www-data php /nextcloud/cron.php"
              resources:
                requests:
                  cpu: 10m
                  memory: 768Mi
                limits:
                  memory: 4Gi
              volumeMounts:
                - name: application-code
                  mountPath: /nextcloud
          volumes:
            - name: application-code
              persistentVolumeClaim:
                claimName: nextcloud-lh-120gi
            - name: config-volume
              configMap:
                name: php-fpm-config
          restartPolicy: Never
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - nextcloud
                      - key: component
                        operator: In
                        values:
                          - web
                  topologyKey: kubernetes.io/hostname
