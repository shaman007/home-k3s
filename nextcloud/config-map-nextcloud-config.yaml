---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: nextcloud
  name: nextcloud-config
  labels:
    app: nextcloud
    component: web
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/instance: nextcloud
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: argoCD
data:
  config: |
    # Set the `immutable` cache control options only for assets with a cache busting `v` argument
    map $arg_v $asset_immutable {
      "" "";
      default "immutable";
    }
    map $http_geoip_country_code $country_code {
      default $http_geoip_country_code;
      "" $http_cf_ipcountry;
    }
    log_format cloud_json escape=json '{'
                           '"time_iso8601":"$time_iso8601",'
                           '"remote_addr":"$remote_addr",'
                           '"x_forwarded_for":"$http_x_forwarded_for",'
                           '"geoip_country":"$http_geoip_country",'
                           '"geoip_country_code":"$http_geoip_country_code",'
                           '"cf_ipcountry":"$country_code",'
                           '"remote_user":"$remote_user",'
                           '"host":"$host",'
                           '"method":"$request_method",'
                           '"request_uri":"$request_uri",'
                           '"status":$status,'
                           '"body_bytes_sent":$body_bytes_sent,'
                           '"referer":"$http_referer",'
                           '"user_agent":"$http_user_agent"'
                         '}';
    server {
      listen 8080;
      # Keep redirect targets relative so Traefik's external scheme/port are preserved.
      absolute_redirect off;
      gzip on;
      index index.php index.html /index.php$request_uri;
      error_log  /var/log/nginx/error.log;
      access_log /var/log/nginx/access.log cloud_json;
      root /nextcloud;
      client_max_body_size 10000M;
      client_body_buffer_size 512k;
      add_header Referrer-Policy                    "no-referrer"   always;
      add_header X-Content-Type-Options             "nosniff"       always;
      add_header X-Download-Options                 "noopen"        always;
      add_header X-Frame-Options                    "SAMEORIGIN"    always;
      add_header X-Permitted-Cross-Domain-Policies  "none"          always;
      add_header X-Robots-Tag                       "noindex, nofollow"  always;
      add_header X-XSS-Protection                   "1; mode=block" always;
      fastcgi_hide_header X-Powered-By;


      location = / {
        if ( $http_user_agent ~ ^DavClnt ) {
            return 302 /remote.php/webdav/$is_args$args;
        }
        return 302 /index.php$request_uri;
      }

      location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
      }
      location ^~ /.well-known {

        location = /.well-known/carddav { return 301 https://cloud.andreybondarenko.com/remote.php/dav/; }
        location = /.well-known/caldav  { return 301 https://cloud.andreybondarenko.com/remote.php/dav/; }

        location /.well-known/acme-challenge    { try_files $uri $uri/ =404; }
        location /.well-known/pki-validation    { try_files $uri $uri/ =404; }
        location = /.well-known/webfinger { return 301 https://cloud.andreybondarenko.com/index.php/.well-known/webfinger; }
        location = /.well-known/nodeinfo { return 301 https://cloud.andreybondarenko.com/index.php/.well-known/nodeinfo; }

        return 301 /index.php$request_uri;
      }

      location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) { return 404; }
      location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) { return 404; }

      location ~ \.php(?:$|/) {
      # Required for legacy support
      rewrite ^/(?!index|remote|public|cron|core\/ajax\/update|status|ocs\/v[12]|updater\/.+|oc[ms]-provider\/.+|.+\/richdocumentscode\/proxy) /index.php$request_uri;
      fastcgi_split_path_info ^(.+?\.php)(/.*)$;
      set $path_info $fastcgi_path_info;
      try_files $fastcgi_script_name =404;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_param PATH_INFO $path_info;
      fastcgi_param HTTPS on;
      fastcgi_param SERVER_PORT 443;
      fastcgi_param HTTP_X_FORWARDED_PORT 443;
      fastcgi_param modHeadersAvailable true;
      fastcgi_param front_controller_active true;
      fastcgi_pass 127.0.0.1:9000;
      fastcgi_intercept_errors on;
      fastcgi_request_buffering off;
      fastcgi_max_temp_file_size 0;
      }

    location ~ \.(?:css|js|svg|gif|png|jpg|ico|wasm|mjs|tflite|map)$ {
        try_files $uri /index.php$request_uri;
        add_header Cache-Control "public, max-age=15778463, $asset_immutable";
        access_log off;

        location ~ \.wasm$ {
            default_type application/wasm;
        }
        location ~ \.mjs$ {
            default_type text/javascript;
        }
    }

    location ~ \.woff2?$ {
        try_files $uri /index.php$request_uri;
        expires 7d;
        access_log off;
    }

    # Rule borrowed from `.htaccess`
    location /remote {
        return 301 /remote.php$request_uri;
    }

    location / {
      #      index index.php;
      try_files $uri $uri/ /index.php$request_uri;
      #try_files $uri /index.php$request_uri;
    }
    }
