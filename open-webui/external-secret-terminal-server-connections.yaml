apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-terminal-server-connections
  namespace: open-webui
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: open-webui
    app.kubernetes.io/part-of: open-webui
    app.kubernetes.io/managed-by: argo-cd
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: open-webui-terminal-server-connections
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        TERMINAL_SERVER_CONNECTIONS: |
          [
            {
              "id": "open-terminal",
              "url": "http://open-terminal.open-terminal.svc.cluster.local:8000",
              "key": "{{ .api_key }}",
              "name": "Repo Context Terminal",
              "auth_type": "bearer",
              "config": {
                "access_grants": []
              }
            }
          ]
  data:
    - secretKey: api_key
      remoteRef:
        key: open-terminal
        property: api_key
