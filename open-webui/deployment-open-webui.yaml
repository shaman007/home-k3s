apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: open-webui
    app.kubernetes.io/managed-by: argoCD
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
        app.kubernetes.io/name: open-webui
        app.kubernetes.io/instance: open-webui
    spec:
      enableServiceLinks: false
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: OLLAMA_BASE_URLS
              value: http://ollama.ollama.svc.cluster.local:11434;http://ollama-small.ollama.svc.cluster.local:11434
            - name: WEBUI_AUTH
              value: "True"
            - name: ENABLE_OPENAI_API
              value: "False"
            - name: ENABLE_IMAGE_GENERATION
              value: "True"
            - name: IMAGE_GENERATION_ENGINE
              value: comfyui
            - name: IMAGE_GENERATION_MODEL
              value: sdxl_lightning_4step.safetensors
            - name: COMFYUI_BASE_URL
              value: http://comfyui.comfyui.svc.cluster.local:8188
            - name: IMAGE_SIZE
              value: 1024x1024
            - name: IMAGE_STEPS
              value: "4"
            - name: IMAGE_PROMPT_GENERATION_PROMPT_TEMPLATE
              value: |
                ### Task:
                Convert the user's request into a concise image-generation prompt for ComfyUI.

                ### Rules:
                - Do not answer the user.
                - Do not say you cannot draw, create, render, browse, or provide images.
                - Do not include apologies, disclaimers, explanations, markdown, or extra text.
                - Do not wrap the JSON in a markdown code fence.
                - The first character of your response must be { and the last character must be }.
                - Keep the prompt concrete and visual.
                - Preserve the user's requested subject, style, composition, colors, and mood.
                - If details are missing, add a few tasteful visual details that help image generation.

                ### Output:
                Return strictly valid JSON and nothing else:
                {
                  "prompt": "image generation prompt here"
                }

                ### User request:
                {{prompt}}
            - name: COMFYUI_WORKFLOW
              value: |
                {
                  "3": {
                    "inputs": {
                      "seed": 0,
                      "steps": 4,
                      "cfg": 1,
                      "sampler_name": "euler",
                      "scheduler": "sgm_uniform",
                      "denoise": 1,
                      "model": ["4", 0],
                      "positive": ["6", 0],
                      "negative": ["7", 0],
                      "latent_image": ["5", 0]
                    },
                    "class_type": "KSampler",
                    "_meta": {
                      "title": "KSampler"
                    }
                  },
                  "4": {
                    "inputs": {
                      "ckpt_name": "sdxl_lightning_4step.safetensors"
                    },
                    "class_type": "CheckpointLoaderSimple",
                    "_meta": {
                      "title": "Load Checkpoint"
                    }
                  },
                  "5": {
                    "inputs": {
                      "width": 1024,
                      "height": 1024,
                      "batch_size": 1
                    },
                    "class_type": "EmptyLatentImage",
                    "_meta": {
                      "title": "Empty Latent Image"
                    }
                  },
                  "6": {
                    "inputs": {
                      "text": "a beautiful image",
                      "clip": ["4", 1]
                    },
                    "class_type": "CLIPTextEncode",
                    "_meta": {
                      "title": "Positive Prompt"
                    }
                  },
                  "7": {
                    "inputs": {
                      "text": "text, watermark, blurry, distorted",
                      "clip": ["4", 1]
                    },
                    "class_type": "CLIPTextEncode",
                    "_meta": {
                      "title": "Negative Prompt"
                    }
                  },
                  "8": {
                    "inputs": {
                      "samples": ["3", 0],
                      "vae": ["4", 2]
                    },
                    "class_type": "VAEDecode",
                    "_meta": {
                      "title": "VAE Decode"
                    }
                  },
                  "9": {
                    "inputs": {
                      "filename_prefix": "open-webui",
                      "images": ["8", 0]
                    },
                    "class_type": "SaveImage",
                    "_meta": {
                      "title": "Save Image"
                    }
                  }
                }
            - name: COMFYUI_WORKFLOW_NODES
              value: |
                [
                  {"type": "prompt", "key": "text", "node_ids": ["6"]},
                  {"type": "model", "key": "ckpt_name", "node_ids": ["4"]},
                  {"type": "width", "key": "width", "node_ids": ["5"]},
                  {"type": "height", "key": "height", "node_ids": ["5"]},
                  {"type": "steps", "key": "steps", "node_ids": ["3"]},
                  {"type": "seed", "key": "seed", "node_ids": ["3"]}
                ]
            - name: ENABLE_SIGNUP
              value: "False"
            - name: TZ
              value: Europe/Prague
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: open-webui-data
              mountPath: /app/backend/data
      volumes:
        - name: open-webui-data
          persistentVolumeClaim:
            claimName: open-webui-data
