---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-resource-requests
  namespace: open-webui
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 256Mi
      default:
        memory: 2Gi
      min:
        cpu: 10m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 4Gi
