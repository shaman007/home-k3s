apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sensitive-path-throttle
  namespace: open-webui
spec:
  rateLimit:
    average: 30
    burst: 15
    period: 1m
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sensitive-path-throttle
  namespace: open-webui
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      priority: 200
      match: >-
        Host(`chat.andreybondarenko.com`) &&
        (PathPrefix(`/auth`) || Path(`/_app/version.json`)) &&
        !ClientIP(`192.168.1.0/24`) &&
        !HeaderRegexp(`GeoIP-Country-Code`, `^CZ$`) &&
        !HeaderRegexp(`CF-IPCountry`, `^CZ$`)
      middlewares:
        - name: sensitive-path-throttle
        - name: hsts
      services:
        - kind: Service
          name: open-webui
          port: 8080
  tls:
    certResolver: letsencrypt
