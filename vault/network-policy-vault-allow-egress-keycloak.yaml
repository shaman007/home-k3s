apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-allow-egress-keycloak
  namespace: vault
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - ipBlock:
            cidr: 192.168.1.209/32
        - ipBlock:
            cidr: 192.168.1.100/32
        - ipBlock:
            cidr: 81.19.4.105/32
      ports:
        - protocol: TCP
          port: 443
