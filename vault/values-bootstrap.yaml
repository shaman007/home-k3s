injector:
  enabled: false

server:
  includeConfigAnnotation: true
  affinity: ""
  ha:
    enabled: true
    replicas: 2
    clusterAddr: "http://$(HOSTNAME).vault-internal:8201"
    raft:
      enabled: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          telemetry {
            unauthenticated_metrics_access = "true"
          }
        }

        storage "raft" {
          path = "/vault/data"
        }

        service_registration "kubernetes" {}

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }
