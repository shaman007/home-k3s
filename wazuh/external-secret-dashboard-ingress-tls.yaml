---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wazuh-dashboard-ingress-tls
  namespace: wazuh
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: wazuh-dashboard-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: wazuh
        property: dashboard_pem
    - secretKey: tls.key
      remoteRef:
        key: wazuh
        property: dashboard_key_pem
