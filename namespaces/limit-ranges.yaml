apiVersion: v1
kind: LimitRange
metadata:
  name: default-resource-requests
  namespace: argocd
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 25m
        memory: 128Mi
      default:
        memory: 1Gi
      min:
        cpu: 5m
        memory: 32Mi
      max:
        cpu: "2"
        memory: 4Gi
