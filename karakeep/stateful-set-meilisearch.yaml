---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  namespace: karakeep
  labels:
    app: karakeep
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/instance: meilisearch
    app.kubernetes.io/version: "1.38.2"
    app.kubernetes.io/managed-by: argoCD
spec:
  serviceName: meilisearch-headless
  replicas: 1
  selector:
    matchLabels:
      app: meilisearch
  template:
    metadata:
      labels:
        app: meilisearch
    spec:
      containers:
      - name: meilisearch
        image: harbor.andreybondarenko.com/dockerhub/getmeili/meilisearch:v1.38.2
        env:
        # Keep the existing data path for the in-place 1.38.2 upgrade.
        - name: MEILI_DB_PATH
          value: /meili_data/data-v1.37.0-r1.ms
        # Temporary: enable Meilisearch's one-shot database migration on startup.
        - name: MEILI_EXPERIMENTAL_DUMPLESS_UPGRADE
          value: "true"
        # Keep indexing memory below container limits to prevent OOM during import.
        - name: MEILI_MAX_INDEXING_MEMORY
          value: "1000000000"
        - name: MEILI_NO_ANALYTICS
          value: "true"
        - name: MEILI_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: karakeep-secret-env
              key: MEILI_MASTER_KEY
        volumeMounts:
        - name: meili-data
          mountPath: /meili_data
        resources:
          requests:
            cpu: 10m
            memory: 1250Mi
          limits:
            memory: 1250Mi
      volumes:
      - name: meili-data
        persistentVolumeClaim:
          claimName: meili-data
