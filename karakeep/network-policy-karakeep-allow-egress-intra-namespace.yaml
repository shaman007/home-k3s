apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: karakeep-allow-egress-intra-namespace
  namespace: karakeep
spec:
  podSelector:
    matchLabels:
      app: karakeep
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: karakeep
          podSelector:
            matchLabels:
              app: meilisearch
      ports:
        - protocol: TCP
          port: 7700
