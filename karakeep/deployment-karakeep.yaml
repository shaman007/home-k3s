---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep
  namespace: karakeep
  labels:
    app: karakeep
    app.kubernetes.io/name: karakeep
    app.kubernetes.io/instance: karakeep
    app.kubernetes.io/version: "0.31.0"
    app.kubernetes.io/managed-by: argoCD
  annotations:
    configmap.reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: karakeep
  template:
    metadata:
      labels:
        app: karakeep
    spec:
      priorityClassName: homelab-standard
      containers:
        - name: web
          image: harbor.andreybondarenko.com/github/karakeep-app/karakeep:0.32.0
          ports:
            - containerPort: 3000
          startupProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          env:
            - name: CRAWLER_STORE_PDF
              value: "true"
          envFrom:
            - configMapRef:
                name: karakeep-env
            - secretRef:
                name: karakeep-secret-env
          volumeMounts:
            - name: karakeep-data
              mountPath: /data
          resources:
            requests:
              cpu: 93m
              memory: 896Mi
            limits:
              memory: 1152Mi
        - name: chrome
          image: harbor.andreybondarenko.com/library/alpine-chrome:latest
          imagePullPolicy: Always
          command: ["/usr/bin/chromium-browser"] # override ENTRYPOINT
          args:
            - --no-sandbox
            - --headless
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --user-data-dir=/data/profile
            - --no-first-run
            - --no-default-browser-check
            - --disable-gpu
            - --disable-vulkan
            - --use-angle=swiftshader
            - --use-gl=swiftshader
            - --disable-features=MediaRouter,Translate,OnDeviceModel,OptimizationHints,OptimizationGuideModelDownloading
          env:
            - {name: DBUS_SYSTEM_BUS_ADDRESS, value: "disabled:"}
            - {name: DBUS_SESSION_BUS_ADDRESS, value: "disabled:"}
          volumeMounts:
            - {name: dshm, mountPath: /dev/shm}
            - {name: chrome-data, mountPath: /data}
          ports:
            - {containerPort: 9222}
          resources:
            requests:
              cpu: 40m
              memory: 1Gi
            limits:
              memory: 1536Mi
      volumes:
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 1Gi}
        - name: chrome-data
          emptyDir: {}
        - name: karakeep-data
          persistentVolumeClaim:
            claimName: karakeep-data
