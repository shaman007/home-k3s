name: Validate Kubernetes

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-manifests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: v0.7.0
        run: |
          curl -fsSL -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform
          rm -f kubeconform.tar.gz

      - name: Discover Kubernetes manifests
        run: |
          python tools/ci/list-k8s-manifest-files.py --print0 > manifest-files.txt
          manifest_count="$(tr '\0' '\n' < manifest-files.txt | sed '/^$/d' | wc -l | tr -d ' ')"
          echo "Discovered ${manifest_count} Kubernetes manifest files."
          if [ "${manifest_count}" -gt 0 ]; then
            tr '\0' '\n' < manifest-files.txt
          fi

      - name: Validate tracked manifests with kubeconform
        run: |
          if [ ! -s manifest-files.txt ]; then
            echo "No Kubernetes manifests discovered."
            exit 0
          fi

          xargs -0 -a manifest-files.txt kubeconform \
            -summary \
            -strict \
            -ignore-missing-schemas
