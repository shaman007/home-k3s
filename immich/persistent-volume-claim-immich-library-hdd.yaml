---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library-hdd
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-server
    app.kubernetes.io/instance: immich-server
    app.kubernetes.io/part-of: immich
    app.kubernetes.io/managed-by: argoCD
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  volumeName: immich-library-hdd
  selector:
    matchLabels:
      app: immich-server
      storage-role: immich-library
  resources:
    requests:
      storage: 10Gi
