cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

cni:
  resources:
    requests:
      memory: 32Mi

hubble:
  enabled: true
  relay:
    enabled: true
    logOptions:
      format: text-ts
  ui:
    enabled: true

ipam:
  mode: kubernetes

ipv4:
  enabled: true

ipv6:
  enabled: false

k8sServiceHost: localhost
k8sServicePort: 7445
kubeProxyReplacement: true

operator:
  replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

routingMode: tunnel

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

tunnelProtocol: vxlan
