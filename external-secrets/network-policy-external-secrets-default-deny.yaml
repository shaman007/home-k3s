# Network policy for external-secrets controllers/webhook.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-default-deny
  namespace: external-secrets
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: NotIn
        values:
          - external-secrets-webhook
  policyTypes:
    - Ingress
    - Egress
