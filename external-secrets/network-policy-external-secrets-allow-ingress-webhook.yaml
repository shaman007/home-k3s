apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-allow-ingress-webhook
  namespace: external-secrets
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-webhook
  policyTypes:
    - Ingress
  ingress:
    # Admission webhook calls can arrive from node addresses or through the
    # cluster pod network, depending on how k3s proxies API server webhook
    # traffic to worker-hosted Pods.
    - from:
        - ipBlock:
            cidr: 192.168.1.0/24
        - ipBlock:
            cidr: 10.42.0.0/16
        - ipBlock:
            cidr: 2a02:e98:c0:1800::/64
        - ipBlock:
            cidr: 2001:cafe:42::/56
      ports:
        - protocol: TCP
          port: 10250
