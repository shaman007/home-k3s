apiVersion: apps/v1
kind: Deployment
metadata:
  name: mempalace
  namespace: mempalace
  labels:
    app: mempalace
    app.kubernetes.io/name: mempalace
    app.kubernetes.io/instance: mempalace
    app.kubernetes.io/managed-by: argoCD
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mempalace
  template:
    metadata:
      labels:
        app: mempalace
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: bootstrap-mempalace
          image: harbor.andreybondarenko.com/dockerhub/library/python:3.14-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /bootstrap/bootstrap-mempalace.sh
          env:
            - name: HOME
              value: /data
            - name: PIP_NO_CACHE_DIR
              value: "1"
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: mempalace-data
              mountPath: /data
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
      containers:
        - name: mempalace
          image: harbor.andreybondarenko.com/dockerhub/library/python:3.14-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /bootstrap/run-host.sh
          env:
            - name: HOME
              value: /data
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 2048Mi
            limits:
              memory: 2048Mi
          volumeMounts:
            - name: mempalace-data
              mountPath: /data
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - /data/venv/bin/python -c "import mempalace"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - /data/venv/bin/python -c "import mempalace"
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
      volumes:
        - name: mempalace-data
          persistentVolumeClaim:
            claimName: mempalace-data
        - name: bootstrap
          configMap:
            name: mempalace-bootstrap
            defaultMode: 0555
