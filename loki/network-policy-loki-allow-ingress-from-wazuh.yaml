apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loki-allow-ingress-from-wazuh
  namespace: loki
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: single-binary
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wazuh
      ports:
        - protocol: TCP
          port: 3100
