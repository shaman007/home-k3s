apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
  labels:
    app: loki
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
    app.kubernetes.io/version: "v1.15.0"
    app.kubernetes.io/managed-by: argoCD
data:
  config.alloy: |
    livedebugging {
      enabled = true
    }

    discovery.kubernetes "kubernetes_pods" {
        role = "pod"
    }

    discovery.relabel "kubernetes_pods" {
        targets = discovery.kubernetes.kubernetes_pods.targets

        // Keep DaemonSet replicas from duplicating cluster-wide pod logs by
        // only tailing containers scheduled onto the current node.
        rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            regex         = env("ALLOY_NODE_NAME")
            action        = "keep"
        }

        rule {
            source_labels = ["__meta_kubernetes_pod_controller_name"]
            regex         = "([0-9a-z-.]+?)(-[0-9a-f]{8,10})?"
            target_label  = "__tmp_controller_name"
        }

        rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name", "__meta_kubernetes_pod_label_app", "__tmp_controller_name", "__meta_kubernetes_pod_name"]
            regex         = "^;*([^;]+)(;.*)?$"
            target_label  = "app"
        }

        rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance", "__meta_kubernetes_pod_label_instance"]
            regex         = "^;*([^;]+)(;.*)?$"
            target_label  = "instance"
        }

        rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component", "__meta_kubernetes_pod_label_component"]
            regex         = "^;*([^;]+)(;.*)?$"
            target_label  = "component"
        }

        rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node_name"
        }

        rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
        }

        rule {
            source_labels = ["namespace", "app"]
            separator     = "/"
            target_label  = "job"
        }

        rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
        }

        rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
        }
    }

    loki.process "kubernetes_pods" {
        forward_to = [loki.write.default.receiver]

        stage.decolorize { }

        // Dawarich is running in a verbose Rails mode and occasionally emits
        // entries larger than Loki's 256KiB limit. Trim the line before write
        // and drop the repetitive framework chatter that does not help triage.
        stage.match {
            selector = "{namespace=\"dawarich\", app=\"dawarich\"}"

            stage.drop {
                expression = "^(  Rendering .*|.*ApiController#current_api_user.*|  (CACHE )?User Load .*)$"
            }

            stage.truncate {
                rule {
                    limit  = "240KiB"
                    suffix = "... [truncated by alloy]"
                }
            }
        }

        stage.drop {
            expression = ".*(\\/health|\\/metrics|\\/ping).*"
        }
    }

    loki.source.kubernetes "kubernetes_pods" {
        targets    = discovery.relabel.kubernetes_pods.output
        forward_to = [loki.process.kubernetes_pods.receiver]
    }

    discovery.relabel "systemd_journal" {
        targets = []

        rule {
            source_labels = ["__journal__systemd_unit"]
            target_label  = "unit"
        }

        rule {
            source_labels = ["__journal__hostname"]
            target_label  = "hostname"
        }

        rule {
            source_labels = ["__journal__boot_id"]
            target_label  = "boot_id"
        }

        rule {
            source_labels = ["__journal__machine_id"]
            target_label  = "machine_id"
        }

        rule {
            source_labels = ["__journal__priority"]
            target_label  = "priority"
        }

        rule {
            source_labels = ["__journal__syslog_identifier"]
            target_label  = "syslog_identifier"
        }

        rule {
            source_labels = ["__journal__transport"]
            target_label  = "transport"
        }

        rule {
            source_labels = ["unit"]
            target_label  = "_stream"
            replacement   = "unit=\"$1\""
        }
    }

    loki.source.kubernetes_events "cluster_events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [
            loki.process.cluster_events.receiver,
        ]
    }

    loki.process "cluster_events" {
        forward_to = [loki.write.default.receiver]

        stage.regex {
            expression = ".*name=(?P<name>[^ ]+).*kind=(?P<kind>[^ ]+).*objectAPIversion=(?P<apiVersion>[^ ]+).*type=(?P<type>[^ ]+).*"
        }

        stage.labels {
            values = {
                kubernetes_cluster_events = "job",
                name                      = "name",
                kind                      = "kind",
                apiVersion                = "apiVersion",
                type                      = "type",
            }
        }
    }

    loki.write "default" {
        endpoint {
            url       = "http://loki-gateway.loki.svc.cluster.local/loki/api/v1/push"
        }
        external_labels = {}
    }
