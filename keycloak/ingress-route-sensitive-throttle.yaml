apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sensitive-path-throttle
  namespace: keycloak
spec:
  rateLimit:
    average: 30
    burst: 15
    period: 1m
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sensitive-path-throttle
  namespace: keycloak
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      priority: 200
      match: >-
        Host(`sso.andreybondarenko.com`) &&
        (PathPrefix(`/realms/master/protocol/openid-connect/auth`) ||
        PathPrefix(`/realms/master/protocol/openid-connect/token`)) &&
        !ClientIP(`192.168.1.0/24`) &&
        !HeadersRegexp(`GeoIP-Country-Code`, `^CZ$`) &&
        !HeadersRegexp(`CF-IPCountry`, `^CZ$`)
      middlewares:
        - name: sensitive-path-throttle
        - name: hsts
      services:
        - kind: Service
          name: keycloak
          port: 8080
  tls:
    certResolver: letsencrypt
