apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich
  namespace: dawarich
  labels:
    app: dawarich
    app.kubernetes.io/name: dawarich
    app.kubernetes.io/instance: dawarich
    app.kubernetes.io/managed-by: argoCD
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dawarich
  template:
    metadata:
      labels:
        app: dawarich
    spec:
      priorityClassName: homelab-standard
      containers:
        - name: dawarich
          env:
            - name: TIME_ZONE
              value: "Europe/Prague"
            - name: RAILS_ENV
              value: development
            - name: REDIS_URL
              value: redis://redis-dawarich.dawarich.svc.cluster.local:6379
            - name: DATABASE_HOST
              value: dawarich-postgres.dawarich.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USERNAME
              value: postgres
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-password
                  key: password
            - name: DATABASE_NAME
              value: dawarich_development
            - name: MIN_MINUTES_SPENT_IN_CITY
              value: "60"
            - name: APPLICATION_HOST
              value: localhost
            - name: APPLICATION_HOSTS
              value: "dawarich.andreybondarenko.com, localhost"
            - name: APPLICATION_PROTOCOL
              value: http
            - name: DISTANCE_UNIT
              value: km
            - name: PHOTON_API_HOST
              value: photon.dawarich.svc.cluster.local
            - name: PHOTON_API_USE_HTTPS
              value: "false"
            - name: RAILS_MIN_THREADS
              value: "5"
            - name: RAILS_MAX_THREADS
              value: "10"
            - name: SELF_HOSTED
              value: "true"
            - name: OIDC_CLIENT_ID
              value: "dawarich"
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oidc-client-secret
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_ISSUER
              value: "https://sso.andreybondarenko.com/realms/master"
            - name: OIDC_REDIRECT_URI
              value: "https://dawarich.andreybondarenko.com/users/auth/openid_connect/callback"
              #OIDC_AUTO_REGISTER=true # optional, default is false
              #OIDC_PROVIDER_NAME=YourProviderName # optional, default is OpenID Connect
              #ALLOW_EMAIL_PASSWORD_REGISTRATION=false # optional, default is true
          image: harbor.andreybondarenko.com/dockerhub/freikin/dawarich:1.7.11
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /var/app/public
              name: public
            - mountPath: /var/app/tmp/imports/watched
              name: watched
            - mountPath: /var/app/storage
              name: storage
          command:
            - "web-entrypoint.sh"
          args:
            - "bin/rails server -p 3000 -b 0.0.0.0"
          resources:
            requests:
              memory: "1536Mi"
              cpu: "75m"
            limits:
              memory: "2Gi"
          ports:
            - containerPort: 3000
        - name: dawarich-sidekiq
          env:
            - name: RAILS_ENV
              value: development
            - name: SELF_HOSTED
              value: "true"
            - name: STORE_GEODATA
              value: "true"
            - name: REDIS_URL
              value: redis://redis-dawarich.dawarich.svc.cluster.local:6379
            - name: DATABASE_HOST
              value: dawarich-postgres.dawarich.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USERNAME
              value: postgres
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-password
                  key: password
            - name: DATABASE_NAME
              value: dawarich_development
            - name: RAILS_MIN_THREADS
              value: "1"
            - name: RAILS_MAX_THREADS
              value: "10"
            - name: BACKGROUND_PROCESSING_CONCURRENCY
              value: "10"
            - name: APPLICATION_HOST
              value: localhost
            - name: APPLICATION_HOSTS
              value: "dawarich.andreybondarenko.com, localhost"
            - name: APPLICATION_PROTOCOL
              value: http
            - name: DISTANCE_UNIT
              value: km
            - name: PHOTON_API_HOST
              value: photon.dawarich.svc.cluster.local
            - name: PHOTON_API_USE_HTTPS
              value: "false"
          image: harbor.andreybondarenko.com/dockerhub/freikin/dawarich:1.7.11
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /var/app/public
              name: public
            - mountPath: /var/app/tmp/imports/watched
              name: watched
            - mountPath: /var/app/storage
              name: storage
          command:
            - "sidekiq-entrypoint.sh"
          args:
            - "bsidekiq"
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "704Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: public
          persistentVolumeClaim:
            claimName: public
        - name: watched
          persistentVolumeClaim:
            claimName: watched
        - name: storage
          persistentVolumeClaim:
            claimName: storage
