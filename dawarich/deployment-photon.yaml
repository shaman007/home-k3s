apiVersion: apps/v1
kind: Deployment
metadata:
  name: photon
  namespace: dawarich
  labels:
    app: photon
    app.kubernetes.io/name: photon
    app.kubernetes.io/instance: photon
    app.kubernetes.io/managed-by: argoCD
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: photon
  template:
    metadata:
      labels:
        app: photon
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: photon
          image: harbor.andreybondarenko.com/dockerhub/rtuszik/photon-docker:2.1.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              (
                i=0
                while [ "$i" -lt 60 ]; do
                  if curl -fsS http://127.0.0.1:9201/_cluster/health >/dev/null 2>&1; then
                    echo 'eyJwZXJzaXN0ZW50Ijp7ImNsdXN0ZXIucm91dGluZy5hbGxvY2F0aW9uLm5vZGVfaW5pdGlhbF9wcmltYXJpZXNfcmVjb3ZlcmllcyI6IjUifX0=' | base64 -d >/tmp/photon-cluster-settings.json
                    curl -fsS -X PUT -H 'Content-Type: application/json' \
                      http://127.0.0.1:9201/_cluster/settings \
                      --data-binary @/tmp/photon-cluster-settings.json >/dev/null 2>&1 || true
                    break
                  fi
                  i=$((i + 1))
                  sleep 1
                done
              ) &
              exec /bin/sh /photon/entrypoint.sh uv run -m src.process_manager
          env:
            - name: UPDATE_STRATEGY
              value: SEQUENTIAL
            - name: UPDATE_INTERVAL
              value: 720h
            - name: JAVA_PARAMS
              value: >-
                -Des.cluster.routing.allocation.node_initial_primaries_recoveries=5
          ports:
            - containerPort: 2322
          startupProbe:
            httpGet:
              path: /status
              port: 2322
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2160
          readinessProbe:
            httpGet:
              path: /status
              port: 2322
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /status
              port: 2322
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: photon-data
              mountPath: /photon/data
          resources:
            requests:
              memory: "1545Mi"
              cpu: "10m"
            limits:
              memory: "1545Mi"
      volumes:
        - name: photon-data
          persistentVolumeClaim:
            claimName: photon-data
