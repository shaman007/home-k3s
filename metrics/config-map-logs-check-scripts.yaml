---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logs-check-scripts
  namespace: monitoring
  labels:
    app: logs-check
    app.kubernetes.io/name: logs-check
    app.kubernetes.io/instance: logs-check
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: argoCD
data:
  logs-check.py: |
    #!/usr/bin/env python3
    import html
    import json
    import os
    import smtplib
    import sys
    import time
    import urllib.error
    import urllib.parse
    import urllib.request
    from datetime import datetime, timedelta
    from email.message import EmailMessage
    from pathlib import Path
    from zoneinfo import ZoneInfo

    SERVICE_ACCOUNT_DIR = Path("/var/run/secrets/kubernetes.io/serviceaccount")
    SERVICE_ACCOUNT_TOKEN = SERVICE_ACCOUNT_DIR / "token"
    SERVICE_ACCOUNT_CA = SERVICE_ACCOUNT_DIR / "ca.crt"


    def env(name, default=None, required=False):
        value = os.environ.get(name, default)
        if required and (value is None or value == ""):
            raise SystemExit(f"Missing required environment variable: {name}")
        return value


    def env_int(name, default):
        raw = env(name, str(default))
        try:
            return int(raw)
        except ValueError as exc:
            raise SystemExit(f"Environment variable {name} must be an integer, got {raw!r}") from exc


    def load_sa_token():
        if not SERVICE_ACCOUNT_TOKEN.exists():
            return ""
        return SERVICE_ACCOUNT_TOKEN.read_text(encoding="utf-8").strip()


    def log_progress(message):
        print(message, file=sys.stderr, flush=True)


    def http_json(url, *, headers=None, method="GET", payload=None):
        request_headers = dict(headers or {})
        data = None
        if payload is not None:
            data = json.dumps(payload).encode("utf-8")
            request_headers["Content-Type"] = "application/json"

        request = urllib.request.Request(url, headers=request_headers, data=data, method=method)
        timeout_seconds = env_int("HTTP_TIMEOUT_SECONDS", 60)
        max_attempts = max(1, env_int("HTTP_MAX_ATTEMPTS", 3))
        retry_delay_seconds = max(0, env_int("HTTP_RETRY_DELAY_SECONDS", 5))

        last_exc = None
        for attempt in range(1, max_attempts + 1):
            try:
                with urllib.request.urlopen(request, timeout=timeout_seconds) as response:
                    return json.load(response)
            except (TimeoutError, urllib.error.HTTPError, urllib.error.URLError, json.JSONDecodeError) as exc:
                last_exc = exc
                if attempt >= max_attempts:
                    raise
                time.sleep(retry_delay_seconds * attempt)
        raise last_exc  # pragma: no cover


    def kube_json(path, *, method="GET", payload=None):
        base_url = env("KUBERNETES_API_URL", "https://kubernetes.default.svc")
        token = load_sa_token()
        headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/json",
        }
        ssl_context = None
        if SERVICE_ACCOUNT_CA.exists():
            import ssl

            ssl_context = ssl.create_default_context(cafile=str(SERVICE_ACCOUNT_CA))
        url = base_url.rstrip("/") + path
        request_headers = headers
        data = None
        if payload is not None:
            data = json.dumps(payload).encode("utf-8")
            request_headers = dict(headers)
            request_headers["Content-Type"] = "application/json"
        request = urllib.request.Request(url, headers=request_headers, data=data, method=method)
        timeout_seconds = env_int("HTTP_TIMEOUT_SECONDS", 60)
        with urllib.request.urlopen(request, timeout=timeout_seconds, context=ssl_context) as response:
            return json.load(response)


    def get_window():
        tz = ZoneInfo(env("REPORT_TIMEZONE", "Europe/Prague"))
        now = datetime.now(tz)
        end_local = now.replace(minute=0, second=0, microsecond=0)
        start_local = end_local - timedelta(hours=env_int("LOOKBACK_HOURS", 168))
        return start_local, end_local


    def loki_query_range(query, start_ns, end_ns, *, limit):
        base_url = env("LOKI_BASE_URL", "http://loki-gateway.loki.svc.cluster.local/loki/api/v1")
        batch_limit = max(1, env_int("LOKI_BATCH_LIMIT", 1000))
        requested_limit = limit if limit > 0 else None
        current_end_ns = end_ns
        entries = []

        while current_end_ns >= start_ns:
            current_limit = batch_limit
            if requested_limit is not None:
                remaining = requested_limit - len(entries)
                if remaining <= 0:
                    break
                current_limit = min(current_limit, remaining)

            params = urllib.parse.urlencode(
                {
                    "query": query,
                    "start": str(start_ns),
                    "end": str(current_end_ns),
                    "limit": str(current_limit),
                    "direction": "backward",
                }
            )
            payload = http_json(f"{base_url.rstrip('/')}/query_range?{params}")
            batch_entries = []
            for stream in payload.get("data", {}).get("result", []):
                labels = stream.get("stream", {})
                for timestamp_ns, line in stream.get("values", []):
                    batch_entries.append(
                        {
                            "ts_ns": int(timestamp_ns),
                            "ts": datetime.fromtimestamp(int(timestamp_ns) / 1_000_000_000, tz=ZoneInfo("UTC")).isoformat(),
                            "namespace": labels.get("namespace", ""),
                            "pod": labels.get("pod", ""),
                            "container": labels.get("container", ""),
                            "job": labels.get("job", ""),
                            "line": line.strip(),
                        }
                    )

            if not batch_entries:
                break

            batch_entries.sort(key=lambda item: item["ts_ns"], reverse=True)
            entries.extend(batch_entries)

            oldest_ts_ns = batch_entries[-1]["ts_ns"]
            if oldest_ts_ns <= start_ns or len(batch_entries) < current_limit:
                break
            current_end_ns = oldest_ts_ns - 1

        entries.sort(key=lambda item: item["ts_ns"], reverse=True)
        return entries


    def grafana_preflight():
        base_url = env("GRAFANA_BASE_URL", "http://grafana.monitoring.svc.cluster.local:3000")
        checks = []
        for path in ("/api/health",):
            url = base_url.rstrip("/") + path
            try:
                payload = http_json(url)
                checks.append({"path": path, "ok": True, "payload": payload})
            except Exception as exc:  # noqa: BLE001
                checks.append({"path": path, "ok": False, "error": str(exc)})
        return checks


    def loki_preflight():
        base_url = env("LOKI_BASE_URL", "http://loki-gateway.loki.svc.cluster.local/loki/api/v1")
        try:
            payload = http_json(f"{base_url.rstrip('/')}/labels")
            return {"ok": True, "label_count": len(payload.get("data", []))}
        except Exception as exc:  # noqa: BLE001
            return {"ok": False, "error": str(exc)}


    def ollama_preflight():
        base_url = env("OLLAMA_BASE_URL", "http://ollama.ollama.svc.cluster.local:11434")
        model = env("OLLAMA_MODEL", "gpt-oss:20b")
        checks = {"base_url": base_url, "model": model}
        try:
            checks["version"] = http_json(f"{base_url.rstrip('/')}/api/version")
            checks["version_ok"] = True
        except Exception as exc:  # noqa: BLE001
            checks["version_ok"] = False
            checks["version_error"] = str(exc)

        try:
            tags = http_json(f"{base_url.rstrip('/')}/api/tags")
            names = [item.get("name", "") for item in tags.get("models", [])]
            checks["tags_ok"] = True
            checks["available_models"] = names
            checks["model_present"] = any(name == model or name.startswith(model + ":") for name in names)
        except Exception as exc:  # noqa: BLE001
            checks["tags_ok"] = False
            checks["tags_error"] = str(exc)
            checks["model_present"] = False

        checks["ok"] = bool(checks.get("version_ok")) and bool(checks.get("tags_ok"))
        return checks


    def grafana_datasource_preflight():
        namespace = env("REPORT_NAMESPACE", "monitoring")
        try:
            payload = kube_json(f"/api/v1/namespaces/{namespace}/configmaps/grafana-datasources")
        except urllib.error.HTTPError as exc:
            return {"ok": False, "error": f"{exc.code} {exc.reason}"}
        except Exception as exc:  # noqa: BLE001
            return {"ok": False, "error": str(exc)}

        raw = payload.get("data", {}).get("datasources.yaml", "")
        datasources = []
        current = {}
        for line in raw.splitlines():
            stripped = line.strip()
            if stripped.startswith("- name:"):
                if current:
                    datasources.append(current)
                current = {"name": stripped.split(":", 1)[1].strip()}
            elif stripped.startswith("type:"):
                current["type"] = stripped.split(":", 1)[1].strip()
            elif stripped.startswith("url:"):
                current["url"] = stripped.split(":", 1)[1].strip()
        if current:
            datasources.append(current)
        return {"ok": True, "datasources": datasources}


    def fetch_previous_report(name):
        namespace = env("REPORT_NAMESPACE", "monitoring")
        try:
            payload = kube_json(f"/api/v1/namespaces/{namespace}/configmaps/{name}")
        except urllib.error.HTTPError as exc:
            if exc.code == 404:
                return ""
            raise
        return payload.get("data", {}).get("report.txt", "")


    def upsert_report(name, report, payload_json):
        namespace = env("REPORT_NAMESPACE", "monitoring")
        body = {
            "apiVersion": "v1",
            "kind": "ConfigMap",
            "metadata": {
                "name": name,
                "namespace": namespace,
                "labels": {
                    "app": "logs-check",
                    "app.kubernetes.io/name": "logs-check",
                    "app.kubernetes.io/instance": "logs-check",
                    "app.kubernetes.io/part-of": "monitoring",
                    "app.kubernetes.io/managed-by": "argoCD",
                },
            },
            "data": {
                "report.txt": report,
                "report.json": json.dumps(payload_json, indent=2, ensure_ascii=True),
            },
        }

        object_path = f"/api/v1/namespaces/{namespace}/configmaps/{name}"
        try:
            existing = kube_json(object_path)
            body["metadata"]["resourceVersion"] = existing["metadata"]["resourceVersion"]
            return kube_json(object_path, method="PUT", payload=body)
        except urllib.error.HTTPError as exc:
            if exc.code != 404:
                raise
        return kube_json(f"/api/v1/namespaces/{namespace}/configmaps", method="POST", payload=body)


    def html_stat(label, value):
        return (
            "<td style=\"padding:14px 16px;border:1px solid #dbe3ea;background:#ffffff;\">"
            f"<div style=\"font-size:12px;line-height:1.4;color:#516070;text-transform:uppercase;\">{html.escape(label)}</div>"
            f"<div style=\"font-size:22px;line-height:1.3;font-weight:700;color:#16202a;\">{html.escape(str(value))}</div>"
            "</td>"
        )


    def render_html_report(start_local, end_local, analysis, preflight, entry_counts):
        rows = []
        for name, count in entry_counts.items():
            label = name.replace("_candidates", "").replace("_", " ").title()
            rows.append(html_stat(label, count))
        while len(rows) % 2:
            rows.append("<td></td>")
        stat_rows = "".join(f"<tr>{''.join(rows[index:index + 2])}</tr>" for index in range(0, len(rows), 2))

        check_rows = []
        for name, value in preflight.items():
            ok = value.get("ok") if isinstance(value, dict) else all(item.get("ok") for item in value if isinstance(item, dict))
            color = "#116329" if ok else "#9a3412"
            label = "OK" if ok else "Review"
            check_rows.append(
                "<tr>"
                f"<td style=\"padding:10px 12px;border-bottom:1px solid #e7edf3;color:#16202a;font-weight:600;\">{html.escape(str(name).replace('_', ' ').title())}</td>"
                f"<td style=\"padding:10px 12px;border-bottom:1px solid #e7edf3;text-align:right;color:{color};font-weight:700;\">{label}</td>"
                "</tr>"
            )

        return f"""<!doctype html>
    <html>
      <body style="margin:0;padding:0;background:#eef3f7;color:#16202a;font-family:Arial,Helvetica,sans-serif;">
        <div style="max-width:760px;margin:0 auto;padding:24px;">
          <div style="background:#16202a;color:#ffffff;padding:22px 24px;border-radius:8px 8px 0 0;">
            <div style="font-size:13px;line-height:1.4;color:#b8c7d3;">Home k3s</div>
            <h1 style="margin:4px 0 0;font-size:24px;line-height:1.25;">Logs check</h1>
            <div style="margin-top:8px;color:#dbe7ef;font-size:14px;line-height:1.5;">
              {html.escape(start_local.strftime('%Y-%m-%d %H:%M %Z'))} to {html.escape(end_local.strftime('%Y-%m-%d %H:%M %Z'))}
            </div>
          </div>
          <div style="background:#ffffff;border:1px solid #dbe3ea;border-top:0;padding:22px 24px;">
            <table role="presentation" style="width:100%;border-collapse:collapse;margin-bottom:22px;">{stat_rows}</table>
            <h2 style="margin:0 0 10px;font-size:17px;line-height:1.35;color:#16202a;">Analysis</h2>
            <div style="white-space:pre-wrap;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.55;color:#26323d;background:#f8fafc;border:1px solid #dbe3ea;border-radius:6px;padding:14px;">{html.escape(analysis or 'No analysis was produced.')}</div>
            <h2 style="margin:22px 0 10px;font-size:17px;line-height:1.35;color:#16202a;">Preflight</h2>
            <table role="presentation" style="width:100%;border-collapse:collapse;border:1px solid #e7edf3;">{''.join(check_rows)}</table>
          </div>
        </div>
      </body>
    </html>"""


    def send_email(subject, body, html_body):
        smtp_host = env("SMTP_HOST", required=True)
        smtp_port = env_int("SMTP_PORT", 25)
        mail_from = env("MAIL_FROM", required=True)
        mail_to = env("MAIL_TO", required=True)

        message = EmailMessage()
        message["From"] = mail_from
        message["To"] = mail_to
        message["Subject"] = subject
        message.set_content(body)
        message.add_alternative(html_body, subtype="html")

        with smtplib.SMTP(host=smtp_host, port=smtp_port, timeout=30) as smtp:
            smtp.send_message(message)


    def trim_line(value, max_chars=220):
        text = " ".join(value.split())
        if len(text) <= max_chars:
            return text
        return text[: max_chars - 3] + "..."


    def render_entries(entries, max_items):
        lines = []
        items = entries if max_items <= 0 else entries[:max_items]
        for item in items:
            line = trim_line(item["line"])
            lines.append(
                f"- {item['ts']} | ns={item['namespace'] or '-'} pod={item['pod'] or '-'} "
                f"container={item['container'] or '-'} | {line}"
            )
        return "\n".join(lines) if lines else "- none"


    def render_entry_for_prompt(category, item):
        line = " ".join(item["line"].split())
        return (
            f"[{category}] {item['ts']} | ns={item['namespace'] or '-'} pod={item['pod'] or '-'} "
            f"container={item['container'] or '-'} | {line}"
        )


    def chunk_blocks(blocks, max_chars):
        limit = max(1000, max_chars)
        batches = []
        current = []
        current_len = 0

        for block in blocks:
            block_len = len(block) + 1
            if current and current_len + block_len > limit:
                batches.append("\n".join(current))
                current = [block]
                current_len = len(block)
            else:
                current.append(block)
                current_len += block_len

        if current:
            batches.append("\n".join(current))
        return batches


    def build_log_batches(grouped_entries):
        blocks = []
        for name, entries in grouped_entries.items():
            for item in entries:
                blocks.append(render_entry_for_prompt(name, item))
        return chunk_blocks(blocks, env_int("OLLAMA_BATCH_CONTEXT_CHARS", 12000))


    def compact_entries_for_storage(grouped_entries):
        max_chars = env_int("MAX_REPORT_JSON_CHARS", 900000)
        serialized = json.dumps(grouped_entries, ensure_ascii=True)
        if len(serialized) <= max_chars:
            return grouped_entries, False

        compact = {}
        for name, entries in grouped_entries.items():
            compact[name] = {
                "entry_count": len(entries),
                "newest_ts": entries[0]["ts"] if entries else None,
                "oldest_ts": entries[-1]["ts"] if entries else None,
                "examples": entries[:20],
            }
        return compact, True


    def call_ollama(system_prompt, user_prompt, *, num_predict=350):
        base_url = env("OLLAMA_BASE_URL", "http://ollama.ollama.svc.cluster.local:11434")
        model = env("OLLAMA_MODEL", "gpt-oss:20b")
        payload = {
            "model": model,
            "stream": False,
            "options": {
                "temperature": 0.1,
                "num_predict": num_predict,
            },
            "messages": [
                {"role": "system", "content": system_prompt},
                {"role": "user", "content": user_prompt},
            ],
        }
        response = http_json(f"{base_url.rstrip('/')}/api/chat", method="POST", payload=payload)
        message = response.get("message", {})
        return (message.get("content") or "").strip()


    def analyze_logs_with_ollama(start_local, end_local, preflight, previous_report, grouped_entries):
        total_entries = sum(len(entries) for entries in grouped_entries.values())
        if total_entries == 0:
            return ""

        log_batches = build_log_batches(grouped_entries)
        log_progress(f"prepared ollama log batches count={len(log_batches)} total_entries={total_entries}")
        batch_summaries = []
        batch_system_prompt = (
            "You are reviewing one batch of home Kubernetes logs.\n"
            "Classify findings into exactly one of: real fault, probe instability, noise, or platform issue.\n"
            "Use only the provided log entries in this batch.\n"
            "Do not invent missing context.\n"
            "Deduplicate repeated lines that represent the same issue.\n"
            "Call out exact namespaces, pods, and timestamps seen in this batch.\n"
            "Output plain text only.\n"
            "End with 'Batch takeaway:' followed by one short sentence."
        )

        for index, batch in enumerate(log_batches, start=1):
            log_progress(f"starting ollama batch index={index} total={len(log_batches)}")
            batch_user_prompt = "\n\n".join(
                [
                    f"Window: {start_local.isoformat()} to {end_local.isoformat()}",
                    f"Batch {index} of {len(log_batches)}",
                    "Log entries:",
                    batch,
                ]
            )
            batch_summary = call_ollama(
                batch_system_prompt,
                batch_user_prompt,
                num_predict=env_int("OLLAMA_BATCH_NUM_PREDICT", 500),
            )
            if not batch_summary:
                batch_summary = f"Batch {index} produced an empty summary."
            batch_summaries.append(batch_summary)
            log_progress(f"finished ollama batch index={index} total={len(log_batches)}")

        reduction_system_prompt = (
            "You are merging partial analyses of home Kubernetes logs into one final report.\n"
            "Classify findings into exactly one of: real fault, probe instability, noise, or platform issue.\n"
            "Prefer higher-severity and cross-batch recurring issues first.\n"
            "Deduplicate repeated observations across batches.\n"
            "If something appears in the previous report, mention it as ongoing rather than new.\n"
            "Do not invent evidence beyond the provided batch summaries and preflight data.\n"
            "Do not output tables or code blocks.\n"
            "End with 'Smallest next action:' followed by one concrete next step."
        )

        reduction_blocks = [
            f"Batch summary {index}:\n{text}"
            for index, text in enumerate(batch_summaries, start=1)
        ]
        reduction_limit = env_int("OLLAMA_REDUCTION_CONTEXT_CHARS", 16000)
        reduction_round = 1
        while len(reduction_blocks) > 1:
            reduced = []
            reduction_batches = chunk_blocks(reduction_blocks, reduction_limit)
            log_progress(
                f"starting reduction round={reduction_round} batches={len(reduction_batches)}"
            )
            for index, batch in enumerate(reduction_batches, start=1):
                log_progress(
                    f"starting reduction batch round={reduction_round} index={index} total={len(reduction_batches)}"
                )
                reduction_user_prompt = "\n\n".join(
                    [
                        f"Window: {start_local.isoformat()} to {end_local.isoformat()}",
                        f"Reduction round: {reduction_round}",
                        f"Reduction batch {index} of {len(reduction_batches)}",
                        "Preflight:",
                        json.dumps(preflight, indent=2, ensure_ascii=True),
                        "Partial analyses:",
                        batch,
                    ]
                )
                reduced_summary = call_ollama(
                    reduction_system_prompt,
                    reduction_user_prompt,
                    num_predict=env_int("OLLAMA_REDUCTION_NUM_PREDICT", 700),
                )
                if not reduced_summary:
                    reduced_summary = f"Reduction batch {index} produced an empty summary."
                reduced.append(reduced_summary)
                log_progress(
                    f"finished reduction batch round={reduction_round} index={index} total={len(reduction_batches)}"
                )
            reduction_blocks = reduced
            reduction_round += 1

        final_user_prompt = "\n\n".join(
            [
                f"Window: {start_local.isoformat()} to {end_local.isoformat()}",
                f"Entry counts: {json.dumps({name: len(entries) for name, entries in grouped_entries.items()}, ensure_ascii=True)}",
                "Grafana/Loki/Ollama preflight:",
                json.dumps(preflight, indent=2, ensure_ascii=True),
                "Previous report excerpt:",
                previous_report[:4000] if previous_report else "(none)",
                "Merged analysis:",
                reduction_blocks[0],
            ]
        )
        log_progress("starting final ollama synthesis")
        return call_ollama(
            reduction_system_prompt,
            final_user_prompt,
            num_predict=env_int("OLLAMA_REDUCTION_NUM_PREDICT", 700),
        )


    def fallback_analysis(preflight, grouped_entries):
        lines = [
            "1. [platform issue] Local Ollama was unreachable from the CronJob, so LLM summarization did not run.",
            f"   Context: {preflight.get('ollama', {}).get('base_url', 'unknown')}",
        ]
        version_error = preflight.get("ollama", {}).get("version_error")
        tags_error = preflight.get("ollama", {}).get("tags_error")
        if version_error:
            lines.append(f"   Version check error: {version_error}")
        if tags_error:
            lines.append(f"   Tags check error: {tags_error}")

        for name, entries in grouped_entries.items():
            if not entries:
                continue
            first = entries[0]
            lines.append(
                f"2. [{name}] Sample context: {first['ts']} ns={first['namespace'] or '-'} "
                f"pod={first['pod'] or '-'} container={first['container'] or '-'}"
            )
            lines.append(f"   Example: {trim_line(first['line'])}")
            break

        lines.append("Smallest next action: verify the `ollama` Service has ready endpoints when this CronJob runs, then rerun the job.")
        return "\n".join(lines)


    def find_first(entries, needle):
        needle = needle.lower()
        for item in entries:
            if needle in item["line"].lower():
                return item
        return None


    def summarize_samples(grouped_entries):
        lines = []

        platform_entries = grouped_entries.get("platform_issue_candidates", [])
        real_fault_entries = grouped_entries.get("real_fault_candidates", [])
        probe_entries = grouped_entries.get("probe_instability_candidates", [])

        redis_lock = find_first(platform_entries, "leaderelection.go:332")
        if redis_lock:
            lines.append(
                "1. [platform issue] `redis-operator` is repeatedly failing leader-election calls to the Kubernetes API."
            )
            lines.append(
                f"   Context: ns={redis_lock['namespace']} pod={redis_lock['pod']} at {redis_lock['ts']}."
            )
            lines.append(
                "   Evidence: requests to `https://10.43.0.1:443` were refused while reading the Lease object."
            )

        adapter_dns = find_first(platform_entries, "prometheus.default.svc")
        if adapter_dns:
            lines.append(
                "2. [platform issue] `prometheus-adapter` is querying a non-resolving Prometheus hostname."
            )
            lines.append(
                f"   Context: ns={adapter_dns['namespace']} pod={adapter_dns['pod']} at {adapter_dns['ts']}."
            )
            lines.append(
                "   Evidence: DNS lookup for `prometheus.default.svc` failed."
            )

        mastodon_timeout = find_first(real_fault_entries, "HTTP::TimeoutError")
        if mastodon_timeout:
            lines.append(
                "3. [real fault] Mastodon background media redownload jobs are retrying due to upstream timeouts."
            )
            lines.append(
                f"   Context: ns={mastodon_timeout['namespace']} pod={mastodon_timeout['pod']} at {mastodon_timeout['ts']}."
            )
            lines.append(
                "   Evidence: repeated `Read timed out after 10 seconds` failures in pull workers."
            )

        mastodon_530 = find_first(real_fault_entries, "returned code 530")
        if mastodon_530:
            lines.append(
                "4. [real fault] Mastodon also has repeated remote media fetch failures returning HTTP 530."
            )
            lines.append(
                f"   Context: ns={mastodon_530['namespace']} pod={mastodon_530['pod']} at {mastodon_530['ts']}."
            )

        stirling_env = find_first(real_fault_entries, ".env")
        if stirling_env:
            lines.append(
                "5. [noise] Stirling-PDF is logging scanner traffic for `/.env`-style paths as application errors."
            )
            lines.append(
                f"   Context: ns={stirling_env['namespace']} pod={stirling_env['pod']} at {stirling_env['ts']}."
            )
            lines.append(
                "   Evidence: requests like `/public/.env` and `/assets/.env` produce `NoResourceFoundException`."
            )

        traefik_backend = find_first(platform_entries, "Error while dialing backend")
        if traefik_backend:
            lines.append(
                "6. [platform issue] Traefik had at least one backend connection refusal."
            )
            lines.append(
                f"   Context: ns={traefik_backend['namespace']} pod={traefik_backend['pod']} at {traefik_backend['ts']}."
            )

        if probe_entries and not lines:
            first = probe_entries[0]
            lines.append(
                f"1. [probe instability] Probe-related failures were observed in ns={first['namespace']} pod={first['pod']} at {first['ts']}."
            )

        if not lines:
            lines.append("1. [noise] No clear high-signal issue was derived from the sampled logs.")

        lines.append(
            "Smallest next action: investigate the Kubernetes API connectivity failures first, because they can destabilize operators and hide secondary issues."
        )
        return "\n".join(lines)


    def main():
        start_local, end_local = get_window()
        start_ns = int(start_local.astimezone(ZoneInfo("UTC")).timestamp() * 1_000_000_000)
        end_ns = int(end_local.astimezone(ZoneInfo("UTC")).timestamp() * 1_000_000_000)
        sample_limit = env_int("LOKI_QUERY_LIMIT", 80)

        preflight = {
            "grafana": grafana_preflight(),
            "loki": loki_preflight(),
            "grafana_datasources": grafana_datasource_preflight(),
            "ollama": ollama_preflight(),
        }

        queries = {
            "real_fault_candidates": '{namespace=~".+",namespace!~"loki|monitoring"} |~ "panic|fatal|Traceback|traceback|Exception|exception|segfault|OutOfMemory|OOMKilled|CrashLoopBackOff|Back-off restarting failed container|failed to start|error syncing pod|segmentation fault"',
            "probe_instability_candidates": '{namespace=~".+",namespace!~"loki"} |~ "Readiness probe failed|readiness probe failed|Liveness probe failed|liveness probe failed|Startup probe failed|startup probe failed|probe failed"',
            "noise_candidates": '{namespace=~".+",namespace!~"loki"} |~ "deprecated|comparison expired|controller refresh requested|OIDC|oidc|stale session|No status changes. Skipping patch|warning|Warning"',
            "platform_issue_candidates": '{namespace=~".+",namespace!~"loki"} |~ "context deadline exceeded|i/o timeout|connection refused|TLS handshake timeout|tls handshake timeout|dial tcp|no such host|Temporary failure in name resolution|temporary failure in name resolution"',
        }

        grouped_entries = {}
        query_errors = {}
        for name, query in queries.items():
            log_progress(f"querying Loki bucket={name}")
            try:
                grouped_entries[name] = loki_query_range(query, start_ns, end_ns, limit=sample_limit)
                log_progress(f"queried Loki bucket={name} entries={len(grouped_entries[name])}")
            except Exception as exc:  # noqa: BLE001
                grouped_entries[name] = []
                query_errors[name] = str(exc)
                log_progress(f"query failed bucket={name} error={exc}")
        if query_errors:
            preflight["query_errors"] = query_errors
        previous_report = fetch_previous_report(env("REPORT_CONFIGMAP_NAME", "logs-check-report"))
        try:
            analysis = analyze_logs_with_ollama(
                start_local,
                end_local,
                preflight,
                previous_report,
                grouped_entries,
            )
        except Exception as exc:  # noqa: BLE001
            preflight["ollama"]["chat_error"] = str(exc)
            analysis = fallback_analysis(preflight, grouped_entries)
        if not analysis.strip():
            analysis = summarize_samples(grouped_entries)
        report = "\n".join(
            [
                "Home k3s logs check",
                "",
                f"Window: {start_local.strftime('%Y-%m-%d %H:%M:%S %Z')} to {end_local.strftime('%Y-%m-%d %H:%M:%S %Z')}",
                "",
                analysis or "Ollama returned an empty analysis.",
                "",
                "Preflight summary:",
                json.dumps(preflight, indent=2, ensure_ascii=True),
            ]
        ).strip() + "\n"

        payload_json = {
            "generated_at": datetime.now(ZoneInfo("UTC")).isoformat(),
            "window_start": start_local.isoformat(),
            "window_end": end_local.isoformat(),
            "preflight": preflight,
            "queries": queries,
            "entry_counts": {name: len(entries) for name, entries in grouped_entries.items()},
            "analysis": analysis,
        }
        stored_entries, truncated_for_storage = compact_entries_for_storage(grouped_entries)
        payload_json["entries"] = stored_entries
        payload_json["entries_truncated_for_storage"] = truncated_for_storage
        upsert_report(env("REPORT_CONFIGMAP_NAME", "logs-check-report"), report, payload_json)
        html_report = render_html_report(
            start_local,
            end_local,
            analysis,
            preflight,
            payload_json["entry_counts"],
        )
        send_email(
            f"Home k3s logs check - {end_local.strftime('%Y-%m-%d %H:%M %Z')}",
            report,
            html_report,
        )
        print(report)


    if __name__ == "__main__":
        try:
            main()
        except Exception as exc:  # noqa: BLE001
            print(f"logs-check failed: {exc}", file=sys.stderr)
            raise
