---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-health-exporter
  namespace: monitoring
  labels:
    app: platform-health-exporter
    app.kubernetes.io/name: platform-health-exporter
    app.kubernetes.io/instance: platform-health-exporter
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: argoCD
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-health-exporter
  template:
    metadata:
      labels:
        app: platform-health-exporter
        app.kubernetes.io/name: platform-health-exporter
        app.kubernetes.io/instance: platform-health-exporter
        app.kubernetes.io/part-of: monitoring
    spec:
      priorityClassName: homelab-essential
      containers:
        - name: nginx
          image: harbor.andreybondarenko.com/dockerhub/nginx:1.31.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 9090
              name: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
            - name: metrics-data
              mountPath: /metrics-data
              readOnly: true
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: config
          configMap:
            name: platform-health-exporter
        - name: metrics-data
          configMap:
            name: platform-health-report
        - name: cache
          emptyDir:
            sizeLimit: 32Mi
        - name: run
          emptyDir:
            sizeLimit: 8Mi
