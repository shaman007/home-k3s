---
apiVersion: v1
kind: Service
metadata:
  name: finance-ticker-exporter
  namespace: monitoring
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: /metrics
  labels:
    app: finance-ticker-exporter
    app.kubernetes.io/name: finance-ticker-exporter
    app.kubernetes.io/instance: finance-ticker-exporter
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: argoCD
spec:
  selector:
    app: finance-ticker-exporter
  ports:
    - name: http
      port: 9090
      targetPort: metrics
