---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-health-report
rules:
  - apiGroups: [""]
    resources:
      - pods
      - secrets
      - services
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
    verbs: ["get", "list"]
  - apiGroups: ["external-secrets.io"]
    resources:
      - externalsecrets
    verbs: ["get", "list"]
  - apiGroups: ["traefik.io"]
    resources:
      - middlewares
      - ingressroutes
    verbs: ["get", "list"]
  - apiGroups: ["longhorn.io"]
    resources:
      - backups
      - recurringjobs
    verbs: ["get", "list"]
