---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-allow-egress-external-access-daily-report-loki
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: external-access-daily-report
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: loki
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080
