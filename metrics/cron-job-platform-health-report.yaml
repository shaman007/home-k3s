---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-health-report
  namespace: monitoring
  labels:
    app: platform-health-report
    app.kubernetes.io/name: platform-health-report
    app.kubernetes.io/instance: platform-health-report
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: argoCD
spec:
  schedule: "40 6 * * *"
  timeZone: Europe/Prague
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: platform-health-report
            app.kubernetes.io/name: platform-health-report
            app.kubernetes.io/instance: platform-health-report
            app.kubernetes.io/part-of: monitoring
        spec:
          enableServiceLinks: false
          serviceAccountName: platform-health-report
          restartPolicy: Never
          containers:
            - name: platform-health-report
              image: harbor.andreybondarenko.com/dockerhub/library/python:3.14-alpine
              imagePullPolicy: IfNotPresent
              command:
                - python3
                - /scripts/platform-health-report.py
              env:
                - name: REPORT_NAMESPACE
                  value: monitoring
                - name: REPORT_CONFIGMAP_NAME
                  value: platform-health-report
                - name: PROMETHEUS_BASE_URL
                  value: http://prometheus-service.monitoring.svc.cluster.local:9090
                - name: LOKI_BASE_URL
                  value: http://loki-gateway.loki.svc.cluster.local/loki/api/v1
                - name: SMTP_HOST
                  value: andreybondarenko.com
                - name: SMTP_PORT
                  value: "25"
                - name: MAIL_FROM
                  value: platform-health-report@andreybondarenko.com
                - name: MAIL_TO
                  value: me@andreybondarenko.com
                - name: CERT_EXPIRY_WARNING_DAYS
                  value: "14"
                - name: PVC_USAGE_WARNING_PERCENT
                  value: "90"
                - name: RESTART_WARNING_COUNT
                  value: "5"
                - name: HTTP_TIMEOUT_SECONDS
                  value: "180"
                - name: HTTP_MAX_ATTEMPTS
                  value: "3"
                - name: HTTP_RETRY_DELAY_SECONDS
                  value: "5"
              resources:
                requests:
                  cpu: 100m
                  memory: 192Mi
                limits:
                  memory: 384Mi
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: platform-health-report-scripts
                defaultMode: 0555
