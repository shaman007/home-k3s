---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-finance-ticker
  namespace: monitoring
data:
  finance-ticker.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "BTC/USD",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "finance_asset_price{symbol=\"BTC\",quote=\"USD\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD","decimals": 2},"overrides": []}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "ETH/USD",
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "finance_asset_price{symbol=\"ETH\",quote=\"USD\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD","decimals": 2},"overrides": []}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "ZETA/USD",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "finance_asset_price{symbol=\"ZETA\",quote=\"USD\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD","decimals": 2},"overrides": []}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "USD/CZK",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "1 / finance_fx_rate{base=\"CZK\",quote=\"USD\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "currencyCZK","decimals": 4},"overrides": []}
        },
        {
          "id": 5,
          "type": "stat",
          "title": "EUR/CZK",
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "1 / finance_fx_rate{base=\"CZK\",quote=\"EUR\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "currencyCZK","decimals": 4},"overrides": []}
        },
        {
          "id": 6,
          "type": "stat",
          "title": "EUR/USD",
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "1 / finance_fx_rate{base=\"USD\",quote=\"EUR\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD","decimals": 4},"overrides": []}
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Wallet ETH",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "finance_wallet_balance{asset=\"ETH\",address=\"0x2144cf4F2c5C4460092c7151B8e8a6A853Ed7330\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "none","decimals": 6},"overrides": []}
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Wallet USD",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 4},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "finance_wallet_value{asset=\"ETH\",quote=\"USD\",address=\"0x2144cf4F2c5C4460092c7151B8e8a6A853Ed7330\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD","decimals": 2},"overrides": []}
        },
        {
          "id": 9,
          "type": "stat",
          "title": "Wallet EUR",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "finance_wallet_value{asset=\"ETH\",quote=\"EUR\",address=\"0x2144cf4F2c5C4460092c7151B8e8a6A853Ed7330\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "currencyEUR","decimals": 2},"overrides": []}
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Wallet CZK",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 4},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"refId": "A", "editorMode": "code", "expr": "finance_wallet_value{asset=\"ETH\",quote=\"CZK\",address=\"0x2144cf4F2c5C4460092c7151B8e8a6A853Ed7330\"}"}],
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false}},
          "fieldConfig": {"defaults": {"unit": "currencyCZK","decimals": 2},"overrides": []}
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "BTC and ETH",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"refId": "A", "editorMode": "code", "expr": "finance_asset_price{symbol=\"BTC\",quote=\"USD\"}", "legendFormat": "BTC/USD"},
            {"refId": "B", "editorMode": "code", "expr": "finance_asset_price{symbol=\"ETH\",quote=\"USD\"}", "legendFormat": "ETH/USD"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD","color": {"mode": "palette-classic"},"custom": {"axisPlacement": "auto","drawStyle": "line","lineWidth": 2,"pointSize": 3,"showPoints": "auto","spanNulls": false}},"overrides": []}
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "ZETA and Wallet USD",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"refId": "A", "editorMode": "code", "expr": "finance_asset_price{symbol=\"ZETA\",quote=\"USD\"}", "legendFormat": "ZETA/USD"},
            {"refId": "B", "editorMode": "code", "expr": "finance_wallet_value{asset=\"ETH\",quote=\"USD\",address=\"0x2144cf4F2c5C4460092c7151B8e8a6A853Ed7330\"}", "legendFormat": "Wallet USD"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD","color": {"mode": "palette-classic"},"custom": {"axisPlacement": "auto","drawStyle": "line","lineWidth": 2,"pointSize": 3,"showPoints": "auto","spanNulls": false}},"overrides": []}
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "FX Rates",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"refId": "A", "editorMode": "code", "expr": "1 / finance_fx_rate{base=\"CZK\",quote=\"USD\"}", "legendFormat": "USD/CZK"},
            {"refId": "B", "editorMode": "code", "expr": "1 / finance_fx_rate{base=\"CZK\",quote=\"EUR\"}", "legendFormat": "EUR/CZK"},
            {"refId": "C", "editorMode": "code", "expr": "1 / finance_fx_rate{base=\"USD\",quote=\"EUR\"}", "legendFormat": "EUR/USD"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short","decimals": 4,"color": {"mode": "palette-classic"},"custom": {"axisPlacement": "auto","drawStyle": "line","lineWidth": 2,"pointSize": 3,"showPoints": "auto","spanNulls": false}},"overrides": []}
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Wallet Values",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"refId": "A", "editorMode": "code", "expr": "finance_wallet_value{asset=\"ETH\",quote=\"USD\",address=\"0x2144cf4F2c5C4460092c7151B8e8a6A853Ed7330\"}", "legendFormat": "USD"},
            {"refId": "B", "editorMode": "code", "expr": "finance_wallet_value{asset=\"ETH\",quote=\"EUR\",address=\"0x2144cf4F2c5C4460092c7151B8e8a6A853Ed7330\"}", "legendFormat": "EUR"},
            {"refId": "C", "editorMode": "code", "expr": "finance_wallet_value{asset=\"ETH\",quote=\"CZK\",address=\"0x2144cf4F2c5C4460092c7151B8e8a6A853Ed7330\"}", "legendFormat": "CZK"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short","color": {"mode": "palette-classic"},"custom": {"axisPlacement": "auto","drawStyle": "line","lineWidth": 2,"pointSize": 3,"showPoints": "auto","spanNulls": false}},"overrides": []}
        }
      ],
      "refresh": "15m",
      "schemaVersion": 42,
      "tags": ["finance", "crypto", "fx", "wallet"],
      "templating": {
        "list": [
          {
            "current": {"selected": true, "text": "prometheus-thanos", "value": "prometheus-thanos"},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-30d", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Finance Ticker",
      "uid": "finance-ticker",
      "version": 1
    }
