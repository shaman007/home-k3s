          "gridPos":{"h":10,"w":8,"x":0,"y":36},
          "datasource":{"type":"prometheus","uid":"${DS_PROMETHEUS}"},
          "targets":[{"refId":"A","editorMode":"code","expr":"topk(10, external_access_analytics_countries_daily{host=\"$host\"})","legendFormat":"{{country}}","range":true}],
          "options":{"displayMode":"basic","orientation":"horizontal","reduceOptions":{"calcs":["lastNotNull"],"fields":"","values":false},"showUnfilled":false},
          "fieldConfig":{"defaults":{"unit":"short","color":{"mode":"palette-classic"}},"overrides":[]}
        },
        {
          "id":16,
          "type":"bargauge",
          "title":"Top 10 Countries (All Hosts)",
          "gridPos":{"h":10,"w":8,"x":16,"y":36},
          "datasource":{"type":"prometheus","uid":"${DS_PROMETHEUS}"},
          "targets":[{"refId":"A","editorMode":"code","expr":"topk(10, sum by (country) (external_access_analytics_countries_daily))","legendFormat":"{{country}}","range":true}],
          "options":{"displayMode":"basic","orientation":"horizontal","reduceOptions":{"calcs":["lastNotNull"],"fields":"","values":false},"showUnfilled":false},
          "fieldConfig":{"defaults":{"unit":"short","color":{"mode":"palette-classic"}},"overrides":[]}
        },
        {
          "id":17,
          "type":"bargauge",
          "title":"Top 20 External IPs (Selected Host)",
          "gridPos":{"h":10,"w":8,"x":8,"y":36},
          "datasource":{"type":"prometheus","uid":"${DS_PROMETHEUS}"},
          "targets":[{"refId":"A","editorMode":"code","expr":"topk(20, external_access_analytics_external_ip_requests_daily{host=\"$host\"})","legendFormat":"{{client_ip}}","range":true}],
          "options":{"displayMode":"basic","orientation":"horizontal","reduceOptions":{"calcs":["lastNotNull"],"fields":"","values":false},"showUnfilled":false},
          "fieldConfig":{"defaults":{"unit":"short","color":{"mode":"palette-classic"}},"overrides":[]}
        }
      ],
      "refresh":"30m",
      "schemaVersion":42,
      "tags":["external-access","analytics","harbor","mail"],
      "templating":{"list":[
