---
apiVersion: v1
kind: ConfigMap
metadata:
  name: finance-ticker-exporter
  namespace: monitoring
  labels:
    app: finance-ticker-exporter
    app.kubernetes.io/name: finance-ticker-exporter
    app.kubernetes.io/instance: finance-ticker-exporter
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: argoCD
data:
  default.conf: |
    server {
      listen 9090;
      access_log off;
      error_log /var/log/nginx/error.log;

      location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
      }

      location = /metrics {
        default_type text/plain;
        charset utf-8;
        alias /metrics-data/metrics.prom;
        add_header Cache-Control "no-store";
      }

      location / {
        return 404;
      }
    }
