---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: spotify
  labels:
    app: mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: mongodb
    app.kubernetes.io/version: "7"
    app.kubernetes.io/managed-by: argoCD
  annotations:
    configmap.reloader.stakater.com/auto: "true"
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        selector: mongodb
    spec:
      containers:
        - name: mongodb
          image: harbor.andreybondarenko.com/dockerhub/mongo:7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
          startupProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)"
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)"
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)"
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "12m"
              memory: "586Mi"
            limits:
              memory: "586Mi"
          volumeMounts:
            - name: mongodb-configmap
              mountPath: /config
              readOnly: true
            - name: mongodb-data
              mountPath: /data/db
        - name: mongo-exporter
          image: harbor.andreybondarenko.com/dockerhub/percona/mongodb_exporter:2.37.0-amd64
          imagePullPolicy: IfNotPresent
          args:
            - --mongodb.uri=mongodb://127.0.0.1:27017
            - --compatible-mode
          livenessProbe:
            tcpSocket:
              port: 9216
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "10m"
              memory: "100Mi"
            limits:
              memory: "100Mi"
          ports:
            - containerPort: 9216
      volumes:
        - name: mongodb-configmap
          configMap:
            name: mongodb-configmap
            items:
              - key: mongo.conf
                path: mongo.conf
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongo-lh
