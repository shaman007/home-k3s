core:
  resources:
    requests:
      memory: 213Mi
      cpu: 10m
    limits:
      memory: 213Mi
database:
  internal:
    resources:
      requests:
        memory: 1250Mi
        cpu: 10m
      limits:
        memory: 1250Mi
exporter:
  replicas: 1
jobservice:
  initContainers:
    - name: wait-for-core
      image: busybox:1.37
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          until wget -qO- http://harbor-core:80/api/v2.0/ping >/dev/null; do
            echo "waiting for harbor-core"
            sleep 5
          done
  resources:
    requests:
      memory: 100Mi
      cpu: 10m
    limits:
      memory: 100Mi
nginx:
  resources:
    requests:
      memory: 100Mi
      cpu: 10m
    limits:
      memory: 100Mi
portal:
  resources:
    requests:
      memory: 100Mi
      cpu: 10m
    limits:
      memory: 100Mi
redis:
  internal:
    resources:
      requests:
        memory: 113Mi
        cpu: 10m
      limits:
        memory: 113Mi
registry:
    registry:
      resources:
        requests:
          memory: 256Mi
          cpu: 124m
        limits:
          memory: 512Mi
    controller:
      resources:
        requests:
          memory: 100Mi
          cpu: 10m
        limits:
          memory: 100Mi
trivy:
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      cpu: null
      memory: 2Gi
notary:
  enabled: false  # disable notary

metrics:
  enabled: true
  core:
    path: /metrics
    port: 8001
  registry:
    path: /metrics
    port: 8001
  jobservice:
    path: /metrics
    port: 8001
  exporter:
    path: /metrics
    port: 8001

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      existingClaim: "harbor-registry"

externalURL: https://harbor.andreybondarenko.com
harborAdminPassword: Harbor12345
