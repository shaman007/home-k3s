apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sensitive-path-throttle
  namespace: harbor
spec:
  rateLimit:
    average: 30
    burst: 15
    period: 1m
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sensitive-path-throttle
  namespace: harbor
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      priority: 200
      match: >-
        Host(`harbor.andreybondarenko.com`) &&
        Path(`/service/token`) &&
        !ClientIP(`192.168.1.0/24`) &&
        !HeadersRegexp(`GeoIP-Country-Code`, `^CZ$`) &&
        !HeadersRegexp(`CF-IPCountry`, `^CZ$`)
      middlewares:
        - name: sensitive-path-throttle
        - name: hsts
      services:
        - kind: Service
          name: harbor-core
          port: 80
  tls:
    certResolver: letsencrypt
