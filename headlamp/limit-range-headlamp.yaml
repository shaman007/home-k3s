---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-resource-requests
  namespace: headlamp
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 25m
        memory: 128Mi
      default:
        memory: 512Mi
      min:
        cpu: 5m
        memory: 32Mi
      max:
        memory: 1Gi
