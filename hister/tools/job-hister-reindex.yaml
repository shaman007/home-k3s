---
apiVersion: batch/v1
kind: Job
metadata:
  name: hister-reindex
  namespace: hister
  annotations:
    argocd.argoproj.io/hook: Skip
  labels:
    app: hister-reindex
    app.kubernetes.io/name: hister-reindex
    app.kubernetes.io/instance: hister-reindex
    app.kubernetes.io/managed-by: argoCD
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: hister-reindex
    spec:
      enableServiceLinks: false
      restartPolicy: Never
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: fix-data-permissions
          image: harbor.andreybondarenko.com/dockerhub/busybox:1.37
          command: ["sh", "-c", "chown -R 65532:65532 /data"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: hister-data
              mountPath: /data
      containers:
        - name: reindex
          image: harbor.andreybondarenko.com/github/asciimoo/hister:master
          imagePullPolicy: Always
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          env:
            - name: HISTER_CONFIG
              value: /data/config.yaml
            - name: HISTER_DATA_DIR
              value: /data
          command:
            - /hister/hister
            - reindex
          volumeMounts:
            - name: hister-data
              mountPath: /data
            - name: hister-config
              mountPath: /data/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: hister-data
          persistentVolumeClaim:
            claimName: hister-data
        - name: hister-config
          secret:
            secretName: hister-access-token
            items:
              - key: config.yml
                path: config.yaml
