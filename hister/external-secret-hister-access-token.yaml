apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hister-access-token
  namespace: hister
  labels:
    app.kubernetes.io/name: hister
    app.kubernetes.io/instance: hister
    app.kubernetes.io/part-of: hister
    app.kubernetes.io/managed-by: argo-cd
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: hister-access-token
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.yml: |
          app:
              search_url: 'https://kagi.com/search?q={query}'
              access_token: {{ .access_token }}
              open_results_on_new_tab: true
          sensitive_content_patterns:
              aws_access_key: 'AKIA[0-9A-Z]{16}'
              github_token: '(ghp|gho|ghu|ghs|ghr)_[a-zA-Z0-9]{36}'
  data:
    - secretKey: access_token
      remoteRef:
        key: hister
        property: access_token
