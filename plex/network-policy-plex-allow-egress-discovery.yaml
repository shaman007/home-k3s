apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: plex-allow-egress-discovery
  namespace: plex
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 192.168.1.0/24
      ports:
        - protocol: UDP
          port: 1900
        - protocol: UDP
          port: 5353
        - protocol: UDP
          port: 32410
        - protocol: UDP
          port: 32412
        - protocol: UDP
          port: 32413
        - protocol: UDP
          port: 32414
    - to:
        - ipBlock:
            cidr: 224.0.0.0/4
      ports:
        - protocol: UDP
          port: 1900
        - protocol: UDP
          port: 5353
    - to:
        - ipBlock:
            cidr: 255.255.255.255/32
      ports:
        - protocol: UDP
          port: 32410
        - protocol: UDP
          port: 32412
        - protocol: UDP
          port: 32413
        - protocol: UDP
          port: 32414
