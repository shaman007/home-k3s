namespace: convertx
namePrefix: convertx
output: convertx/network-policies-generated.yaml
podSelector:
  app: convertx
policies:
  - type: default-deny
  - type: dns-egress
  - type: namespace-egress
  - type: namespace-ingress
    port: 3000
  - type: namespace-ingress
    name: allow-ingress-from-traefik
    namespace: traefik
    port: 3000
